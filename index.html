<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Игры про друзей</title>
<link rel="stylesheet" href="shared/hub-styles.css">
<style>
/* === Mobile-first size overrides === */

/* Login form: larger input & buttons */
.login-form input[type="text"] {
  min-height: 54px;
  font-size: 20px;
  padding: 16px 20px;
}

.login-form .btn {
  min-height: 54px;
  font-size: 20px;
  padding: 16px 32px;
}

.btn-anon {
  background: rgba(255,255,255,0.15);
  color: var(--text-secondary);
}
.btn-anon:hover {
  background: rgba(255,255,255,0.25);
}

/* Header links: large tap targets */
.hub-header-right {
  gap: 8px;
}

.hub-nickname {
  font-size: 16px;
}

.hub-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 44px;
  min-height: 44px;
  padding: 8px 14px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 10px;
  background: rgba(255,255,255,0.07);
  transition: background 0.2s, color 0.2s;
}

.hub-link:hover {
  background: rgba(255,255,255,0.15);
  color: var(--accent-green);
}

.hub-link-logout {
  background: rgba(255,23,68,0.2);
  color: #ff1744;
}
.hub-link-logout:hover {
  background: rgba(255,23,68,0.35);
  color: #ff1744;
}

/* Game cards: generous padding & text */
.game-card {
  padding: 28px;
}
.game-card-icon {
  font-size: 44px;
}
.game-card-name {
  font-size: 20px;
}
.game-card-desc {
  font-size: 14px;
}
.game-card-score {
  font-size: 14px;
}

/* Section titles */
.section-title {
  font-size: 22px;
}
.section-subtitle {
  font-size: 15px;
}

/* Profile section: scores list larger */
.profile-scores-list li {
  padding: 14px 18px;
  min-height: 50px;
  font-size: 16px;
}

/* Back link larger */
.back-link {
  font-size: 16px;
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  padding: 8px 12px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}
.back-link:hover {
  background: rgba(255,255,255,0.1);
}

/* Profile nickname edit area */
.profile-nick-row {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.profile-nick-row .profile-nickname {
  margin-bottom: 0;
}

.profile-nick-edit-btn,
.profile-nick-save-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 44px;
  min-height: 44px;
  padding: 8px 18px;
  border: none;
  border-radius: 10px;
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.profile-nick-edit-btn {
  background: rgba(255,255,255,0.1);
  color: var(--text-secondary);
}
.profile-nick-edit-btn:hover {
  background: rgba(255,255,255,0.18);
}

.profile-nick-save-btn {
  background: var(--accent-green);
  color: #0a1628;
}
.profile-nick-save-btn:hover {
  background: var(--accent-green-dark);
}

.profile-nick-input {
  background: rgba(255,255,255,0.08);
  border: 2px solid var(--border-subtle);
  border-radius: 10px;
  padding: 10px 16px;
  min-height: 44px;
  font-size: 18px;
  color: var(--text-primary);
  font-family: var(--font-mono);
  outline: none;
  flex: 1;
  min-width: 120px;
  max-width: 260px;
}
.profile-nick-input:focus {
  border-color: var(--accent-green);
}

/* Logout button in profile */
#profile-logout-btn {
  min-height: 54px;
  min-width: 160px;
  font-size: 18px !important;
  padding: 14px 36px !important;
  border-radius: 12px !important;
}

/* Mobile responsive */
@media (max-width: 600px) {
  /* --- Compact header: single row --- */
  .hub-header {
    flex-wrap: nowrap;
    gap: 8px;
    padding: 8px 0 10px;
    margin-bottom: 10px;
  }
  .hub-header h1 {
    font-size: 15px;
    width: auto;
    white-space: nowrap;
  }
  .hub-header-right {
    width: auto;
    justify-content: flex-end;
    flex-wrap: nowrap;
    gap: 6px;
    margin-left: auto;
  }
  .hub-nickname {
    width: auto;
    font-size: 13px;
    margin-bottom: 0;
    max-width: 80px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .hub-link {
    padding: 6px 10px;
    font-size: 13px;
    min-width: 44px;
    min-height: 44px;
  }

  /* --- Compact section titles --- */
  .section-title {
    font-size: 18px;
    margin-bottom: 2px;
  }
  .section-subtitle {
    font-size: 13px;
    margin-bottom: 8px;
  }

  /* --- 2-column game cards grid --- */
  .games-grid {
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
  }
  .games-grid .game-card:last-child {
    grid-column: 1 / -1;
  }

  /* --- Compact game cards --- */
  .game-card {
    padding: 14px;
    border-radius: 12px;
  }
  .game-card-icon {
    font-size: 30px;
    margin-bottom: 6px;
  }
  .game-card-name {
    font-size: 15px;
    margin-bottom: 3px;
  }
  .game-card-desc {
    font-size: 12px;
    line-height: 1.35;
    margin-bottom: 6px;
  }
  .game-card-score {
    font-size: 12px;
  }

  .profile-nick-row {
    flex-direction: column;
    align-items: flex-start;
  }
  .profile-nick-input {
    max-width: 100%;
    width: 100%;
  }
}
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="login-screen" class="login-screen">
  <div class="login-title">Игры про друзей</div>
  <div class="login-subtitle">Мини-игры с шутками про ваших друзей</div>
  <div class="login-form">
    <input type="text" id="nickname-input" placeholder="Введите ник" maxlength="20" autocomplete="off">
    <button class="btn btn-primary" id="login-btn">ИГРАТЬ</button>
    <button class="btn btn-anon" id="anon-login-btn">ИГРАТЬ АНОНИМНО</button>
  </div>
</div>

<!-- ===== PIN DISPLAY (for new users) ===== -->
<div id="pin-display-screen" class="login-screen" style="display:none">
  <div class="login-title">Запомните ваш код!</div>
  <div id="pin-code" style="font-size:48px;color:#ffd700;margin:20px 0;letter-spacing:4px"></div>
  <div class="login-subtitle">Этот код нужен для входа в ваш профиль</div>
  <div class="login-form">
    <button class="btn btn-primary" id="pin-understood-btn">ПОНЯТНО, ЗАПОМНИЛ</button>
  </div>
</div>

<!-- ===== PIN ENTRY (for returning users) ===== -->
<div id="pin-entry-screen" class="login-screen" style="display:none">
  <div class="login-title" id="pin-entry-title">Введите код</div>
  <div class="login-subtitle" id="pin-entry-subtitle"></div>
  <div id="pin-error" style="color:#ff1744;margin:8px 0;display:none"></div>
  <div class="login-form">
    <input type="text" id="pin-input" placeholder="XX-XX" maxlength="5" autocomplete="off" style="text-align:center;font-size:28px;letter-spacing:4px">
    <button class="btn btn-primary" id="pin-verify-btn">ВОЙТИ</button>
    <button class="btn btn-anon" id="pin-back-btn">&larr; Другой ник</button>
  </div>
</div>

<!-- ===== MAIN HUB (catalog + profile) ===== -->
<div id="hub-main" class="hub-screen" style="padding:0 20px">
  <header class="hub-header">
    <h1>Игры про друзей</h1>
    <div class="hub-header-right">
      <span class="hub-nickname" id="header-nickname"></span>
      <a class="hub-link" id="profile-toggle">Профиль</a>
      <a class="hub-link hub-link-logout" id="logout-link">Выйти</a>
    </div>
  </header>

  <!-- Catalog -->
  <div id="catalog-section" class="hub-screen active">
    <div class="section-title">Каталог игр</div>
    <div class="section-subtitle">Выбирай и играй!</div>
    <div class="games-grid" id="games-grid"></div>
    <div id="global-leaderboard" style="margin-top:32px;display:none;">
      <div class="section-title">Таблица лидеров</div>
      <div id="leaderboard-tabs" style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;"></div>
      <div id="leaderboard-table"></div>
    </div>
  </div>

  <!-- Profile -->
  <div id="profile-section" class="hub-screen">
    <a class="back-link" id="back-to-catalog">&larr; Назад к играм</a>
    <div class="profile-section">
      <div class="profile-nick-row" id="profile-nick-row">
        <div class="profile-nickname" id="profile-nickname"></div>
      </div>
      <div id="profile-stats" style="margin-top:16px;"></div>
    </div>
    <div class="section-title">Лучшие результаты</div>
    <ul class="profile-scores-list" id="profile-scores"></ul>
    <div style="margin-top:32px;text-align:center;">
      <button id="profile-logout-btn" style="background:#ff1744;color:#fff;border:none;padding:14px 36px;border-radius:12px;font-size:18px;cursor:pointer;font-weight:600;font-family:var(--font-mono);">ВЫЙТИ</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared/supabase-config.js"></script>
<script src="shared/hub-sdk.js"></script>
<script>
// ============ GAMES REGISTRY ============
const GAMES = [
  { slug: 'goose-dima', name: 'Гуси vs Дима', description: 'Уворачивайся от гусей! Дима их боится с детства', icon: '\uD83E\uDEBF' },
  { slug: 'flappy-sanya', name: 'Flappy Саня', description: 'Лети и уворачивайся от курса доллара!', icon: '\uD83D\uDE80' },
  { slug: 'bardak-vitalik', name: 'Бардак Виталика', description: 'Лови посуду! Виталик опять не убрался', icon: '🍽️' },
];

// ============ DOM ELEMENTS ============
const loginScreen = document.getElementById('login-screen');
const hubMain = document.getElementById('hub-main');
const nicknameInput = document.getElementById('nickname-input');
const loginBtn = document.getElementById('login-btn');
const anonLoginBtn = document.getElementById('anon-login-btn');
const headerNickname = document.getElementById('header-nickname');
const profileToggle = document.getElementById('profile-toggle');
const logoutLink = document.getElementById('logout-link');
const catalogSection = document.getElementById('catalog-section');
const profileSection = document.getElementById('profile-section');
const backToCatalog = document.getElementById('back-to-catalog');
const gamesGrid = document.getElementById('games-grid');
const profileNickname = document.getElementById('profile-nickname');
const profileStats = document.getElementById('profile-stats');
const profileScores = document.getElementById('profile-scores');
const profileNickRow = document.getElementById('profile-nick-row');
const profileNickEditBtn = document.getElementById('profile-nick-edit-btn');

// ============ ROUTING ============
function showLogin() {
  loginScreen.classList.add('active');
  hubMain.classList.remove('active');
  // Hide PIN screens if visible
  if (document.getElementById('pin-display-screen')) {
    document.getElementById('pin-display-screen').style.display = 'none';
    document.getElementById('pin-display-screen').classList.remove('active');
  }
  if (document.getElementById('pin-entry-screen')) {
    document.getElementById('pin-entry-screen').style.display = 'none';
    document.getElementById('pin-entry-screen').classList.remove('active');
  }
  nicknameInput.value = '';
  nicknameInput.focus();
}

function showHub() {
  loginScreen.classList.remove('active');
  hubMain.classList.add('active');
  showCatalog();
  updateHeader();
}

function showCatalog() {
  catalogSection.classList.add('active');
  profileSection.classList.remove('active');
  profileToggle.textContent = 'Профиль';
  window.location.hash = '';
  renderGames();
  setTimeout(renderLeaderboard, 50);
}

function showProfile() {
  catalogSection.classList.remove('active');
  profileSection.classList.add('active');
  profileToggle.textContent = 'Игры';
  window.location.hash = 'profile';
  renderProfile();
}

function updateHeader() {
  var player = GameHub.getPlayer();
  headerNickname.textContent = player ? player.nickname : '';
}

// ============ PIN SCREEN ELEMENTS ============
var pinDisplayScreen = document.getElementById('pin-display-screen');
var pinCode = document.getElementById('pin-code');
var pinUnderstoodBtn = document.getElementById('pin-understood-btn');
var pinEntryScreen = document.getElementById('pin-entry-screen');
var pinEntryTitle = document.getElementById('pin-entry-title');
var pinEntrySubtitle = document.getElementById('pin-entry-subtitle');
var pinError = document.getElementById('pin-error');
var pinInput = document.getElementById('pin-input');
var pinVerifyBtn = document.getElementById('pin-verify-btn');
var pinBackBtn = document.getElementById('pin-back-btn');

var _pendingNick = '';

function hideAllScreens() {
  loginScreen.classList.remove('active');
  loginScreen.style.display = '';
  pinDisplayScreen.style.display = 'none';
  pinDisplayScreen.classList.remove('active');
  pinEntryScreen.style.display = 'none';
  pinEntryScreen.classList.remove('active');
  hubMain.classList.remove('active');
}

function showPinDisplay(nick, pin) {
  hideAllScreens();
  pinCode.textContent = pin;
  pinDisplayScreen.style.display = '';
  pinDisplayScreen.classList.add('active');
  _pendingNick = nick;
}

function showPinEntry(nick) {
  hideAllScreens();
  pinEntryTitle.textContent = 'Введите код';
  pinEntrySubtitle.textContent = 'для ' + nick;
  pinError.style.display = 'none';
  pinInput.value = '';
  pinEntryScreen.style.display = '';
  pinEntryScreen.classList.add('active');
  _pendingNick = nick;
  pinInput.focus();
}

// ============ LOGIN ============
async function doLogin() {
  var nick = nicknameInput.value.trim();
  if (!nick) { nicknameInput.focus(); return; }

  // If SDK PIN methods are not available or Supabase is down, fall back to simple login
  if (!GameHub.checkNickname || !GameHub.registerPlayer || !GameHub.verifyPin) {
    GameHub.setPlayer(nick);
    showHub();
    if (GameHub.migrateToSupabase) GameHub.migrateToSupabase();
    return;
  }

  try {
    var result = await GameHub.checkNickname(nick);
    if (result.exists) {
      if (nick === 'Админ') {
        GameHub.setPlayer(nick);
        hideAllScreens();
        showHub();
        return;
      }
      // Returning user — ask for PIN
      showPinEntry(nick);
    } else {
      // New user — register and show PIN
      var reg = await GameHub.registerPlayer(nick);
      if (reg.error) {
        // Registration failed, fall back to simple login
        GameHub.setPlayer(nick);
        showHub();
        return;
      }
      if (reg.offline || nick === 'Админ') {
        // Offline or admin — skip PIN display, go straight to hub
        GameHub.setPlayer(nick);
        hideAllScreens();
        showHub();
        return;
      }
      showPinDisplay(nick, reg.pin);
    }
  } catch (e) {
    // Offline / Supabase unavailable — fall back to simple login
    GameHub.setPlayer(nick);
    showHub();
    if (GameHub.migrateToSupabase) GameHub.migrateToSupabase();
  }
}

async function doPinVerify() {
  var pin = pinInput.value.trim();
  if (!pin) { pinInput.focus(); return; }

  try {
    var result = await GameHub.verifyPin(_pendingNick, pin);
    if (result.ok) {
      GameHub.setPlayer(_pendingNick);
      hideAllScreens();
      showHub();
      if (GameHub.migrateToSupabase) GameHub.migrateToSupabase();
    } else {
      pinError.textContent = 'Неверный код, попробуйте ещё';
      pinError.style.display = 'block';
      pinInput.value = '';
      pinInput.focus();
    }
  } catch (e) {
    pinError.textContent = 'Ошибка сети, попробуйте позже';
    pinError.style.display = 'block';
  }
}

function doPinUnderstood() {
  GameHub.setPlayer(_pendingNick);
  hideAllScreens();
  showHub();
  if (GameHub.migrateToSupabase) GameHub.migrateToSupabase();
}

function doAnonLogin() {
  GameHub.setPlayer('Аноним');
  showHub();
}

// PIN input auto-format: insert dash after 2 digits
pinInput.addEventListener('input', function() {
  var raw = pinInput.value.replace(/[^0-9]/g, '');
  if (raw.length > 4) raw = raw.substring(0, 4);
  if (raw.length > 2) {
    pinInput.value = raw.substring(0, 2) + '-' + raw.substring(2);
  } else {
    pinInput.value = raw;
  }
});

loginBtn.addEventListener('click', doLogin);
anonLoginBtn.addEventListener('click', doAnonLogin);
pinUnderstoodBtn.addEventListener('click', doPinUnderstood);
pinVerifyBtn.addEventListener('click', doPinVerify);
pinBackBtn.addEventListener('click', function() {
  hideAllScreens();
  loginScreen.classList.add('active');
  nicknameInput.focus();
});
pinInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doPinVerify();
});
nicknameInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function doLogout() {
  localStorage.removeItem('gamehub_player');
  window.location.hash = '';
  showLogin();
}

logoutLink.addEventListener('click', doLogout);
document.getElementById('profile-logout-btn').addEventListener('click', doLogout);

// ============ CATALOG ============
function renderGames() {
  gamesGrid.innerHTML = '';
  GAMES.forEach(function(game) {
    var card = document.createElement('a');
    card.className = 'game-card';
    card.href = 'games/' + game.slug + '/';
    card.innerHTML =
      '<div class="game-card-icon">' + game.icon + '</div>' +
      '<div class="game-card-name">' + game.name + '</div>' +
      '<div class="game-card-desc">' + game.description + '</div>' +
      '<div class="game-card-score" id="card-score-' + game.slug + '" style="color:var(--text-muted)">Ещё не играли</div>';
    gamesGrid.appendChild(card);

    GameHub.getMyBestScoreAsync(game.slug).then(function(best) {
      var scoreEl = document.getElementById('card-score-' + game.slug);
      if (scoreEl && best !== null) {
        scoreEl.style.color = '';
        scoreEl.textContent = '\u{1F3C6} Рекорд: ' + best;
      }
    });
  });
}

// ============ PROFILE ============
var _editingNick = false;

function renderProfile() {
  var player = GameHub.getPlayer();
  if (!player) return;

  _editingNick = false;
  profileNickRow.innerHTML = '';

  var nickEl = document.createElement('div');
  nickEl.className = 'profile-nickname';
  nickEl.id = 'profile-nickname';
  nickEl.textContent = player.nickname;
  profileNickRow.appendChild(nickEl);

  // Show loading state
  profileStats.innerHTML =
    '<div class="profile-stat"><div class="profile-stat-value">…</div><div class="profile-stat-label">Игр</div></div>' +
    '<div class="profile-stat"><div class="profile-stat-value">…</div><div class="profile-stat-label">Попыток</div></div>';

  profileScores.innerHTML = '';
  GAMES.forEach(function(game) {
    var li = document.createElement('li');
    li.id = 'profile-score-' + game.slug;
    li.innerHTML =
      '<span class="game-name">' + game.icon + ' ' + game.name + '</span>' +
      '<span class="best-score">…</span>';
    profileScores.appendChild(li);
  });

  // Load scores async from Supabase
  var promises = GAMES.map(function(game) {
    return GameHub.getMyBestScoreAsync(game.slug).then(function(best) {
      var li = document.getElementById('profile-score-' + game.slug);
      if (li) {
        li.querySelector('.best-score').textContent = best !== null ? best : '—';
      }
      return { slug: game.slug, best: best };
    });
  });

  Promise.all(promises).then(function(results) {
    var gamesPlayed = results.filter(function(r) { return r.best !== null; }).length;
    var totalBest = results.reduce(function(sum, r) { return sum + (r.best || 0); }, 0);
    profileStats.innerHTML =
      '<div class="profile-stat"><div class="profile-stat-value">' + gamesPlayed + '</div><div class="profile-stat-label">Игр</div></div>' +
      '<div class="profile-stat"><div class="profile-stat-value">' + totalBest + '</div><div class="profile-stat-label">Сумма очков</div></div>';
  });

  // Admin panel
  var adminDiv = document.getElementById('admin-panel');
  if (adminDiv) adminDiv.remove();
  if (GameHub.isAdmin && GameHub.isAdmin()) {
    adminDiv = document.createElement('div');
    adminDiv.id = 'admin-panel';
    adminDiv.style.cssText = 'margin-top:32px;padding:20px;border:2px solid #ff1744;border-radius:12px;';
    var title = document.createElement('div');
    title.style.cssText = 'color:#ff1744;font-weight:bold;font-size:18px;margin-bottom:12px;';
    title.textContent = 'Админ-панель';
    adminDiv.appendChild(title);

    GAMES.forEach(function(game) {
      var row = document.createElement('div');
      row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;margin:8px 0;';
      row.innerHTML = '<span style="color:#a0c4ff">' + game.icon + ' ' + game.name + '</span>';
      var btn = document.createElement('button');
      btn.style.cssText = 'background:#ff1744;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-family:monospace;font-size:14px;cursor:pointer;min-height:44px;';
      btn.textContent = 'Очистить';
      btn.addEventListener('click', function() {
        if (!confirm('Удалить ВСЕ результаты для ' + game.name + '?')) return;
        GameHub.adminClearScores(game.slug).then(function(res) {
          if (res.ok) {
            btn.textContent = 'Очищено!';
            btn.style.background = '#00e676';
            btn.style.color = '#0a1628';
            setTimeout(function() { renderProfile(); }, 1500);
          } else {
            btn.textContent = 'Ошибка: ' + (res.error || '?');
          }
        });
      });
      row.appendChild(btn);
      adminDiv.appendChild(row);
    });

    profileSection.appendChild(adminDiv);
  }
}


// ============ TOGGLE ============
profileToggle.addEventListener('click', function() {
  if (profileSection.classList.contains('active')) {
    showCatalog();
  } else {
    showProfile();
  }
});

backToCatalog.addEventListener('click', function() {
  showCatalog();
});

// ============ HASH ROUTING ============
var _handlingHash = false;

function handleHash() {
  var player = GameHub.getPlayer();
  if (!player) return;
  _handlingHash = true;
  if (window.location.hash === '#profile') {
    showProfile();
  } else {
    showCatalog();
  }
  _handlingHash = false;
}

window.addEventListener('hashchange', function() {
  if (_handlingHash) return;
  var player = GameHub.getPlayer();
  if (!player) return;
  if (!hubMain.classList.contains('active')) return;
  handleHash();
});

// ============ LEADERBOARD ============
var _activeLeaderboardGame = '';

function renderLeaderboard() {
  var lbDiv = document.getElementById('global-leaderboard');
  var tabsDiv = document.getElementById('leaderboard-tabs');
  var tableDiv = document.getElementById('leaderboard-table');

  if (!GameHub.isSupabaseReady || !GameHub.isSupabaseReady()) {
    // Show local leaderboard instead
    lbDiv.style.display = 'block';
    _renderLeaderboardTabs(tabsDiv);
    _renderLeaderboardLocal(tableDiv, _activeLeaderboardGame || GAMES[0].slug);
    return;
  }

  lbDiv.style.display = 'block';
  _renderLeaderboardTabs(tabsDiv);
  _loadLeaderboardAsync(tableDiv, _activeLeaderboardGame || GAMES[0].slug);
}

function _renderLeaderboardTabs(tabsDiv) {
  tabsDiv.innerHTML = '';
  var activeSlug = _activeLeaderboardGame || GAMES[0].slug;
  GAMES.forEach(function(game) {
    var btn = document.createElement('button');
    btn.className = 'btn btn-small';
    btn.style.cssText = game.slug === activeSlug
      ? 'background:#00e676;color:#0a1628;font-weight:bold;'
      : 'background:rgba(255,255,255,0.1);color:#a0c4ff;';
    btn.textContent = game.icon + ' ' + game.name;
    btn.addEventListener('click', function() {
      _activeLeaderboardGame = game.slug;
      renderLeaderboard();
    });
    tabsDiv.appendChild(btn);
  });
}

function _loadLeaderboardAsync(tableDiv, gameSlug) {
  tableDiv.innerHTML = '<div style="color:var(--text-muted);padding:16px;">Загрузка...</div>';
  GameHub.getLeaderboardAsync(gameSlug, 10).then(function(data) {
    _renderLeaderboardTable(tableDiv, data);
  });
}

function _renderLeaderboardLocal(tableDiv, gameSlug) {
  var data = GameHub.getLeaderboard(gameSlug, 10);
  _renderLeaderboardTable(tableDiv, data);
}

function _escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function _renderLeaderboardTable(tableDiv, data) {
  if (!data || data.length === 0) {
    tableDiv.innerHTML = '<div style="color:var(--text-muted);padding:16px;text-align:center;">Пока нет результатов. Будь первым!</div>';
    return;
  }
  var html = '<table style="width:100%;border-collapse:collapse;font-family:monospace;">';
  html += '<tr style="color:var(--text-muted);font-size:13px;"><th style="text-align:left;padding:8px;">#</th><th style="text-align:left;padding:8px;">Игрок</th><th style="text-align:right;padding:8px;">Очки</th></tr>';
  var player = GameHub.getPlayer();
  var myNick = player ? player.nickname : '';
  data.forEach(function(row, i) {
    var medal = i === 0 ? '\u{1F947}' : i === 1 ? '\u{1F948}' : i === 2 ? '\u{1F949}' : (i + 1);
    var isMe = row.nickname === myNick;
    var rowStyle = isMe ? 'background:rgba(0,230,118,0.1);' : '';
    var nameStyle = isMe ? 'color:#00e676;font-weight:bold;' : 'color:#fff;';
    html += '<tr style="border-top:1px solid rgba(255,255,255,0.05);' + rowStyle + '">';
    html += '<td style="padding:10px 8px;">' + medal + '</td>';
    html += '<td style="padding:10px 8px;' + nameStyle + '">' + _escHtml(row.nickname) + '</td>';
    html += '<td style="padding:10px 8px;text-align:right;color:#ffd700;font-weight:bold;">' + row.score + '</td>';
    html += '</tr>';
  });
  html += '</table>';
  tableDiv.innerHTML = html;
}

// ============ INIT ============
(function init() {
  var player = GameHub.getPlayer();
  if (player) {
    loginScreen.classList.remove('active');
    hubMain.classList.add('active');
    updateHeader();
    handleHash();
    setTimeout(renderLeaderboard, 100);
  } else {
    showLogin();
  }
})();
</script>
</body>
</html>
