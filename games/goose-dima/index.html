// roundRect polyfill for older Safari
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    if (typeof r === 'number') r = [r,r,r,r];
    var tl=r[0]||0,tr=r[1]||0,br=r[2]||0,bl=r[3]||0;
    this.moveTo(x+tl,y); this.lineTo(x+w-tr,y); this.quadraticCurveTo(x+w,y,x+w,y+tr);
    this.lineTo(x+w,y+h-br); this.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
    this.lineTo(x+bl,y+h); this.quadraticCurveTo(x,y+h,x,y+h-bl);
    this.lineTo(x,y+tl); this.quadraticCurveTo(x,y,x+tl,y); this.closePath();
  };
}

// ============ RESIZE ============
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  var dpr = window.devicePixelRatio || 1;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  generateGrass();
}

function generateGrass() {
  grassPatches = [];
  const count = Math.floor((W * H) / 3000);
  for (let i = 0; i < count; i++) {
    grassPatches.push({
      x: Math.random() * W,
      y: Math.random() * H,
      w: 2 + Math.random() * 4,
      h: 8 + Math.random() * 12,
      angle: (Math.random() - 0.5) * 0.4,
      shade: Math.random() > 0.5 ? GRASS_COLOR : GRASS_LIGHT
    });
  }
}

// ============ DIFFICULTY ============
function getDifficultyLevel() {
  return Math.floor(score / 10);
}

function getCurrentGooseSpeed() {
  return (BASE_GOOSE_SPEED + getDifficultyLevel() * SPEED_INCREMENT) * speedMultiplier;
}

function getCurrentSpawnInterval() {
  return Math.max(400, BASE_SPAWN_INTERVAL - getDifficultyLevel() * SPAWN_DECREMENT);
}

// ============ GOOSE SPAWNING ============
function spawnGoose() {
  const edge = Math.floor(Math.random() * 4); // 0=top, 1=bottom, 2=left, 3=right
  let x, y, vx, vy;
  const speed = getCurrentGooseSpeed();
  const isAngry = score >= ANGRY_THRESHOLD && Math.random() < 0.2;
  const wobbles = score >= WOBBLE_THRESHOLD && Math.random() < 0.3;

  const margin = 30;
  switch (edge) {
    case 0: // top
      x = margin + Math.random() * (W - 2 * margin);
      y = -GOOSE_RADIUS;
      vx = (Math.random() - 0.5) * speed * 0.5;
      vy = speed;
      break;
    case 1: // bottom
      x = margin + Math.random() * (W - 2 * margin);
      y = H + GOOSE_RADIUS;
      vx = (Math.random() - 0.5) * speed * 0.5;
      vy = -speed;
      break;
    case 2: // left
      x = -GOOSE_RADIUS;
      y = margin + Math.random() * (H - 2 * margin);
      vx = speed;
      vy = (Math.random() - 0.5) * speed * 0.5;
      break;
    case 3: // right
      x = W + GOOSE_RADIUS;
      y = margin + Math.random() * (H - 2 * margin);
      vx = -speed;
      vy = (Math.random() - 0.5) * speed * 0.5;
      break;
  }

  const gooseSpeed = isAngry ? speed * 1.4 : speed;
  // Normalize direction and apply speed
  const mag = Math.sqrt(vx * vx + vy * vy);
  vx = (vx / mag) * gooseSpeed;
  vy = (vy / mag) * gooseSpeed;

  // Trajectory type
  const trajRoll = Math.random();
  let trajectory = 'straight';
  let arcDrift = 0;
  if (trajRoll < 0.4) {
    trajectory = 'straight';
  } else if (trajRoll < 0.7) {
    trajectory = 'sine';
  } else {
    trajectory = 'arc';
    arcDrift = (Math.random() - 0.5) * 0.3;
  }

  geese.push({
    x, y, vx, vy,
    angry: isAngry,
    wobbles: wobbles,
    wobblePhase: Math.random() * Math.PI * 2,
    radius: isAngry ? GOOSE_RADIUS + 5 : GOOSE_RADIUS,
    rotation: Math.atan2(vy, vx),
    trajectory: trajectory,
    arcDrift: arcDrift
  });
}

// ============ DRAWING FUNCTIONS ============

function drawBackground() {
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, W, H);

  // Grass blades
  for (const g of grassPatches) {
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.angle);
    ctx.fillStyle = g.shade;
    ctx.fillRect(-g.w / 2, -g.h, g.w, g.h);
    ctx.restore();
  }
}

function drawDima(x, y) {
  const r = DIMA_RADIUS;
  ctx.save();
  ctx.translate(x, y);

  // Body (blue shirt)
  ctx.fillStyle = '#3366cc';
  ctx.beginPath();
  ctx.ellipse(0, r * 0.4, r * 0.6, r * 0.7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.strokeStyle = '#2a2a5a';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-6, r * 0.9);
  ctx.lineTo(-8, r * 1.4);
  ctx.moveTo(6, r * 0.9);
  ctx.lineTo(8, r * 1.4);
  ctx.stroke();

  // Arms (waving in fear)
  ctx.strokeStyle = '#ffcc99';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-r * 0.5, r * 0.2);
  ctx.lineTo(-r * 0.9, -r * 0.3);
  ctx.moveTo(r * 0.5, r * 0.2);
  ctx.lineTo(r * 0.9, -r * 0.3);
  ctx.stroke();

  // Head
  ctx.fillStyle = '#ffcc99';
  ctx.beginPath();
  ctx.arc(0, -r * 0.3, r * 0.55, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#553311';
  ctx.beginPath();
  ctx.ellipse(0, -r * 0.65, r * 0.5, r * 0.25, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Eyes (scared, wide open)
  ctx.fillStyle = WHITE;
  ctx.beginPath();
  ctx.ellipse(-6, -r * 0.35, 5, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(6, -r * 0.35, 5, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Pupils (tiny, scared)
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-6, -r * 0.33, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(6, -r * 0.33, 2, 0, Math.PI * 2);
  ctx.fill();

  // Mouth (scared O shape)
  ctx.strokeStyle = '#cc6644';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(0, -r * 0.05, 4, 5, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Eyebrows (worried)
  ctx.strokeStyle = '#553311';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-10, -r * 0.6);
  ctx.lineTo(-3, -r * 0.55);
  ctx.moveTo(10, -r * 0.6);
  ctx.lineTo(3, -r * 0.55);
  ctx.stroke();

  // Skin accessories
  if (selectedSkin === 0) {
    // Glasses
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(-6, -r * 0.35, 7, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(6, -r * 0.35, 7, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-6 + 7, -r * 0.35);
    ctx.lineTo(6 - 7, -r * 0.35);
    ctx.stroke();
    // Temples
    ctx.beginPath();
    ctx.moveTo(-13, -r * 0.35);
    ctx.lineTo(-r * 0.45, -r * 0.35);
    ctx.moveTo(13, -r * 0.35);
    ctx.lineTo(r * 0.45, -r * 0.35);
    ctx.stroke();
  } else if (selectedSkin === 1) {
    // Padel racket in right hand
    ctx.save();
    ctx.translate(r * 0.9, -r * 0.3);
    ctx.rotate(0.3);
    // Handle
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(0, 16);
    ctx.stroke();
    // Racket head
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(0, -8, 8, 11, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = 'rgba(100,200,255,0.3)';
    ctx.fill();
    // Strings
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, -19); ctx.lineTo(0, 3);
    ctx.moveTo(-5, -14); ctx.lineTo(-5, -2);
    ctx.moveTo(5, -14); ctx.lineTo(5, -2);
    ctx.moveTo(-8, -8); ctx.lineTo(8, -8);
    ctx.moveTo(-7, -13); ctx.lineTo(7, -13);
    ctx.stroke();
    ctx.restore();
  } else if (selectedSkin === 2) {
    // Keys near left hand
    ctx.save();
    ctx.translate(-r * 0.9, -r * 0.3);
    ctx.rotate(-0.3);
    // Ring
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.stroke();
    // Key shaft
    ctx.beginPath();
    ctx.moveTo(0, 5);
    ctx.lineTo(0, 18);
    ctx.stroke();
    // Teeth
    ctx.beginPath();
    ctx.moveTo(0, 14); ctx.lineTo(4, 14);
    ctx.moveTo(0, 17); ctx.lineTo(3, 17);
    ctx.stroke();
    ctx.restore();
  }

  ctx.restore();
}

function drawGoose(goose) {
  const { x, y, angry, radius, rotation } = goose;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation - Math.PI / 2); // Face direction of movement

  const r = radius;

  if (angry) {
    // Red tinted angry goose
    ctx.fillStyle = '#ffaaaa';
  } else {
    ctx.fillStyle = '#eeeeee';
  }

  // Body
  ctx.beginPath();
  ctx.ellipse(0, r * 0.2, r * 0.65, r * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Neck
  ctx.fillStyle = angry ? '#ffaaaa' : '#eeeeee';
  ctx.beginPath();
  ctx.ellipse(0, -r * 0.5, r * 0.25, r * 0.45, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.arc(0, -r * 0.85, r * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.moveTo(0, -r * 0.85);
  ctx.lineTo(-r * 0.15, -r * 1.15);
  ctx.lineTo(r * 0.15, -r * 1.15);
  ctx.closePath();
  ctx.fill();

  // Eye
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(angry ? -2 : -3, -r * 0.88, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(angry ? 2 : 3, -r * 0.88, 2, 0, Math.PI * 2);
  ctx.fill();

  // Angry eyebrows
  if (angry) {
    ctx.strokeStyle = '#cc0000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-6, -r * 1.0);
    ctx.lineTo(-1, -r * 0.95);
    ctx.moveTo(6, -r * 1.0);
    ctx.lineTo(1, -r * 0.95);
    ctx.stroke();
  }

  // Wings (small triangles on sides)
  ctx.fillStyle = angry ? '#ff9999' : '#dddddd';
  ctx.beginPath();
  ctx.moveTo(-r * 0.6, r * 0.1);
  ctx.lineTo(-r * 1.0, r * 0.3);
  ctx.lineTo(-r * 0.5, r * 0.5);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(r * 0.6, r * 0.1);
  ctx.lineTo(r * 1.0, r * 0.3);
  ctx.lineTo(r * 0.5, r * 0.5);
  ctx.closePath();
  ctx.fill();

  // Feet
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.ellipse(-4, r * 0.95, 4, 3, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(4, r * 0.95, 4, 3, 0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawHUD() {
  const fontSize = Math.max(16, Math.min(24, W / 25));

  // Score
  ctx.fillStyle = ACCENT;
  ctx.font = `bold ${fontSize}px monospace`;
  ctx.textAlign = 'left';
  ctx.fillText(`Очки: ${score}`, 20, 30);

  // High score
  ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'right';
  ctx.fillText(`Рекорд: ${highScore}`, W - 74, 30);

  // Player name
  const player = window.GameHub?.getPlayer?.();
  if (player?.nickname) {
    ctx.fillStyle = DARK_GRAY;
    ctx.font = `${Math.max(16, fontSize - 4)}px monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(player.nickname, 20, 55);
  }

  // Speed flash
  if (speedFlashTimer > 0) {
    ctx.fillStyle = RED;
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Гуси ускоряются!', W / 2, 65);
  }

  // Pause button
  if (state === 'playing') {
    const pbX = W - 64;
    const pbY = 8;
    const pbS = 44;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.roundRect(pbX, pbY, pbS, pbS, 8);
    ctx.fill();
    ctx.fillStyle = WHITE;
    ctx.font = '24px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⏸', pbX + pbS / 2, pbY + pbS / 2);
    ctx.textBaseline = 'alphabetic';
    pauseButton = { x: pbX, y: pbY, w: pbS, h: pbS };
  }
}

// ============ SPEECH BUBBLE ============

function drawBubble() {
  if (bubbleTimer <= 0) return;
  const alpha = bubbleTimer < 500 ? bubbleTimer / 500 : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.font = 'bold 18px monospace';
  const textW = ctx.measureText(bubbleText).width;
  const padX = 12;
  const padY = 10;
  const bw = textW + padX * 2;
  const bh = 34 + padY;
  const bx = dima.x - bw / 2;
  const by = dima.y - DIMA_RADIUS - 65;

  // Rounded rect bubble
  ctx.fillStyle = WHITE;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 8);
  ctx.fill();

  // Small triangle pointer
  ctx.beginPath();
  ctx.moveTo(dima.x - 6, by + bh);
  ctx.lineTo(dima.x + 6, by + bh);
  ctx.lineTo(dima.x, by + bh + 8);
  ctx.closePath();
  ctx.fill();

  // Text
  ctx.fillStyle = '#000';
  ctx.textAlign = 'center';
  ctx.fillText(bubbleText, dima.x, by + bh / 2 + 5);
  ctx.restore();
}

  const cx = W / 2;

  ctx.fillStyle = WHITE;
  ctx.font = 'bold 42px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ПАУЗА', cx, H * 0.22);

  const btnW = W * 0.7;
  const btnH = 52;
  const btnGap = 14;
  const btnY1 = H * 0.32;
  const btnY2 = btnY1 + btnH + btnGap;
  const btnY3 = btnY2 + btnH + btnGap;

  // ПРОДОЛЖИТЬ
  ctx.fillStyle = '#00e676';
  ctx.beginPath();
  ctx.roundRect(cx - btnW / 2, btnY1, btnW, btnH, 12);
  ctx.fill();
  ctx.fillStyle = '#0a1628';
  ctx.font = 'bold 20px monospace';
  ctx.fillText('ПРОДОЛЖИТЬ', cx, btnY1 + btnH * 0.63);

  // МЕНЮ ИГРЫ
  ctx.fillStyle = '#546e7a';
  ctx.beginPath();
  ctx.roundRect(cx - btnW / 2, btnY2, btnW, btnH, 12);
  ctx.fill();
  ctx.fillStyle = WHITE;
  ctx.font = 'bold 20px monospace';
  ctx.fillText('МЕНЮ ИГРЫ', cx, btnY2 + btnH * 0.63);

  // ← ХАБ
  ctx.fillStyle = '#546e7a';
  ctx.beginPath();
  ctx.roundRect(cx - btnW / 2, btnY3, btnW, btnH, 12);
  ctx.fill();
  ctx.fillStyle = WHITE;
  ctx.font = 'bold 20px monospace';
  ctx.fillText('← ХАБ', cx, btnY3 + btnH * 0.63);

  window._pauseBtns = {
    cont: { x: cx - btnW / 2, y: btnY1, w: btnW, h: btnH },
    exit: { x: cx - btnW / 2, y: btnY2, w: btnW, h: btnH },
    hub: { x: cx - btnW / 2, y: btnY3, w: btnW, h: btnH }
  };
}

// ============ SCREENS ============

function drawStartScreen() {
  drawBackground();

  const cx = W / 2;
  const cy = H / 2;

  // Title
  const titleSize = Math.max(28, Math.min(48, W / 12));
  ctx.fillStyle = WHITE;
  ctx.font = `bold ${titleSize}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('ГУСИ vs ДИМА', cx, cy - 100);

  // Subtitle
  const subSize = Math.max(16, Math.min(18, W / 30));
  ctx.fillStyle = ORANGE;
  ctx.font = `${subSize}px monospace`;
  const subtitle1 = 'Перетаскивай Диму пальцем,';
  const subtitle2 = 'уворачиваясь от гусей!';
  ctx.fillText(subtitle1, cx, cy - 55);
  ctx.fillText(subtitle2, cx, cy - 35);

  // Skin selection
  const cardSize = 76;
  const cardGap = 18;
  const totalCardsW = SKINS.length * cardSize + (SKINS.length - 1) * cardGap;
  const cardsStartX = cx - totalCardsW / 2;
  const skinLabelY = cy - 10;

  ctx.fillStyle = WHITE;
  ctx.font = 'bold 20px monospace';
  ctx.fillText('Выберите лук:', cx, skinLabelY);

  const cardsY = skinLabelY + 14;
  skinCards = [];

  for (let i = 0; i < SKINS.length; i++) {
    const cardX = cardsStartX + i * (cardSize + cardGap);
    const isSelected = (i === selectedSkin);

    // Card background
    ctx.fillStyle = isSelected ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)';
    ctx.strokeStyle = isSelected ? SKIN_COLORS[i] : '#555';
    ctx.lineWidth = isSelected ? 3 : 1;
    ctx.beginPath();
    ctx.roundRect(cardX, cardsY, cardSize, cardSize, 8);
    ctx.fill();
    ctx.stroke();

    // Mini Dima preview
    const prevSkin = selectedSkin;
    selectedSkin = i;
    ctx.save();
    const scale = 0.45;
    ctx.translate(cardX + cardSize / 2, cardsY + cardSize / 2 - 4);
    ctx.scale(scale, scale);
    drawDima(0, 0);
    ctx.restore();
    selectedSkin = prevSkin;

    skinCards.push({ x: cardX, y: cardsY, w: cardSize, h: cardSize, idx: i });
  }

  // Skin joke (wrapped, no skin name labels)
  const jokeFontSize = Math.max(16, Math.min(20, W / 22));
  ctx.fillStyle = '#ffa726';
  ctx.font = `bold ${jokeFontSize}px monospace`;
  ctx.textAlign = 'center';
  const maxJokeWidth = W - 40;
  const words = skinJoke.split(' ');
  const jokeLines = [];
  let curLine = '';
  for (let wi = 0; wi < words.length; wi++) {
    const test = curLine ? curLine + ' ' + words[wi] : words[wi];
    if (ctx.measureText(test).width > maxJokeWidth) {
      if (curLine) jokeLines.push(curLine);
      curLine = words[wi];
    } else {
      curLine = test;
    }
  }
  if (curLine) jokeLines.push(curLine);
  const jokeStartY = cardsY + cardSize + 20;
  for (let li = 0; li < jokeLines.length; li++) {
    ctx.fillText(jokeLines[li], cx, jokeStartY + li * (jokeFontSize + 4));
  }

  // Play button (near bottom)
  const btnW = 200;
  const btnH = 50;
  const btnX = cx - btnW / 2;
  const btnY = H - 170;

  ctx.fillStyle = ACCENT;
  ctx.beginPath();
  ctx.roundRect(btnX, btnY, btnW, btnH, 10);
  ctx.fill();

  ctx.fillStyle = '#0a1628';
  ctx.font = `bold 22px monospace`;
  ctx.fillText('ИГРАТЬ', cx, btnY + 33);

  // Store button bounds for click detection
  startButton = { x: btnX, y: btnY, w: btnW, h: btnH };

  // Hub button below play
  const hubBtnY = btnY + btnH + 12;
  const hubBtnH = 48;
  ctx.fillStyle = '#546e7a';
  ctx.beginPath();
  ctx.roundRect(btnX, hubBtnY, btnW, hubBtnH, 12);
  ctx.fill();
  ctx.fillStyle = WHITE;
  ctx.font = 'bold 16px monospace';
  ctx.fillText('← ХАБ', cx, hubBtnY + 30);

  startHubButton = { x: btnX, y: hubBtnY, w: btnW, h: hubBtnH };

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold ${Math.max(18, Math.min(22, W / 20))}px monospace`;
    ctx.fillText(`Рекорд: ${highScore}`, cx, btnY - 20);
  }

  // Player name
  const player = window.GameHub?.getPlayer?.();
  if (player?.nickname) {
    ctx.fillStyle = DARK_GRAY;
    ctx.font = `${Math.max(18, Math.min(20, W / 22))}px monospace`;
    ctx.fillText(`Игрок: ${player.nickname}`, cx, btnY - 48);
  }
}

function drawGameOverScreen() {
  // Dim the field
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H / 2;

  // Title
  const titleSize = Math.max(32, Math.min(56, W / 10));
  ctx.fillStyle = RED;
  ctx.font = `bold ${titleSize}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('ГА-ГА-ГА!', cx, cy - 120);

  // Subtitle
  const subSize = Math.max(16, Math.min(20, W / 25));
  ctx.fillStyle = WHITE;
  ctx.font = `${subSize}px monospace`;
  ctx.fillText('Гуси поймали Диму!', cx, cy - 80);

  // Score
  ctx.fillStyle = ACCENT;
  ctx.font = `bold 28px monospace`;
  ctx.fillText(`Очки: ${score}`, cx, cy - 45);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = `16px monospace`;
    ctx.fillText('Новый рекорд!', cx, cy - 22);
  }

  // Joke
  ctx.fillStyle = ORANGE;
  const jokeSize = Math.max(18, Math.min(22, W / 20));
  ctx.font = `${jokeSize}px monospace`;
  const jokeLines = currentJoke.split('\n');
  jokeLines.forEach((line, i) => {
    ctx.fillText(line, cx, cy + 10 + i * (jokeSize + 6));
  });

  const jokeEndY = cy + 10 + jokeLines.length * (jokeSize + 6) + 8;

  // Quip (word-wrapped)
  ctx.fillStyle = '#a0c4ff';
  const quipSize = Math.max(16, Math.min(18, W / 24));
  ctx.font = `${quipSize}px monospace`;
  const maxQuipW = W - 40;
  const qWords = currentQuip.split(' ');
  const qLines = [];
  let qCur = '';
  for (let qi = 0; qi < qWords.length; qi++) {
    const qTest = qCur ? qCur + ' ' + qWords[qi] : qWords[qi];
    if (ctx.measureText(qTest).width > maxQuipW) {
      if (qCur) qLines.push(qCur);
      qCur = qWords[qi];
    } else { qCur = qTest; }
  }
  if (qCur) qLines.push(qCur);
  for (let qi = 0; qi < qLines.length; qi++) {
    ctx.fillText(qLines[qi], cx, jokeEndY + 10 + qi * (quipSize + 4));
  }

  const quipEndY = jokeEndY + 10 + qLines.length * (quipSize + 4) + 4;

  // Retry button
  const btnW = 200;
  const btnH = 48;
  const retryX = cx - btnW / 2;
  const retryY = quipEndY + 10;

  ctx.fillStyle = ACCENT;
  ctx.beginPath();
  ctx.roundRect(retryX, retryY, btnW, btnH, 10);
  ctx.fill();
  ctx.fillStyle = '#0a1628';
  ctx.font = `bold 20px monospace`;
  ctx.fillText('ЗАНОВО', cx, retryY + 31);

  retryButton = { x: retryX, y: retryY, w: btnW, h: btnH };

  // Hub button
  const hubY = retryY + btnH + 15;
  const hubW = 200;
  const hubH = 48;
  const hubX = cx - hubW / 2;

  ctx.fillStyle = DARK_GRAY;
  ctx.beginPath();
  ctx.roundRect(hubX, hubY, hubW, hubH, 12);
  ctx.fill();
  ctx.fillStyle = WHITE;
  ctx.font = `bold 16px monospace`;
  ctx.fillText('← ХАБ', cx, hubY + 26);

  hubButton = { x: hubX, y: hubY, w: hubW, h: hubH };
}

let startButton = null;
let startHubButton = null;
let retryButton = null;
let hubButton = null;
let skinCards = [];

// ============ GAME LOGIC ============

function startGame() {
  state = 'playing';
  score = 0;
  geese = [];
  dima.x = W / 2;
  dima.y = H / 2;
  lastSpawnTime = performance.now();
  gameStartTime = performance.now();
  dragging = false;
  speedMultiplier = 1;
  lastSpeedIncrease = 0;
  speedFlashTimer = 0;
  maxGeese = 2;
  lastMaxGeeseIncrease = 0;
  bubbleText = '';
  bubbleTimer = 0;
  nextBubbleTime = performance.now() + 10000;
}

function gameOver() {
  state = 'gameover';
  shakeTimer = 0;
  shakeIntensity = 0;
  currentJoke = JOKES[Math.floor(Math.random() * JOKES.length)];
  currentQuip = DIMA_QUIPS[Math.floor(Math.random() * DIMA_QUIPS.length)];
  if (score > highScore) {
    highScore = score;
    saveHighScore();
  }
  // Submit to hub
  if (window.GameHub?.submitScore) {
    window.GameHub.submitScore('goose-dima', score);
  }
}

function checkCollision(goose) {
  const dx = dima.x - goose.x;
  const dy = dima.y - goose.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < (DIMA_RADIUS + goose.radius - COLLISION_GRACE);
}

function isOffScreen(goose) {
  const margin = goose.radius + 10;
  return goose.x < -margin || goose.x > W + margin ||
         goose.y < -margin || goose.y > H + margin;
}

function update(dt) {
  if (state !== 'playing') return;

  const now = performance.now();

  // Speed increase every 10 seconds
  const speedRef = lastSpeedIncrease > 0 ? lastSpeedIncrease : gameStartTime;
  if (now - speedRef >= 10000) {
    speedMultiplier *= 1.1;
    lastSpeedIncrease = now;
    speedFlashTimer = 1500;
  }
  if (speedFlashTimer > 0) speedFlashTimer -= dt;

  // Speech bubbles
  if (now > nextBubbleTime) {
    bubbleText = BUBBLE_JOKES[Math.floor(Math.random() * BUBBLE_JOKES.length)];
    bubbleTimer = 3000;
    nextBubbleTime = now + 10000 + Math.random() * 10000;
  }
  if (bubbleTimer > 0) bubbleTimer -= dt;

  // Keyboard movement
  const moveSpeed = 4;
  if (keys['ArrowLeft'] || keys['KeyA']) dima.x -= moveSpeed;
  if (keys['ArrowRight'] || keys['KeyD']) dima.x += moveSpeed;
  if (keys['ArrowUp'] || keys['KeyW']) dima.y -= moveSpeed;
  if (keys['ArrowDown'] || keys['KeyS']) dima.y += moveSpeed;

  // Clamp Dima to field
  dima.x = Math.max(DIMA_RADIUS, Math.min(W - DIMA_RADIUS, dima.x));
  dima.y = Math.max(DIMA_RADIUS + 10, Math.min(H - DIMA_RADIUS, dima.y));

  // Increase max simultaneous geese every 15 seconds (cap at 8)
  const geeseRef = lastMaxGeeseIncrease > 0 ? lastMaxGeeseIncrease : gameStartTime;
  if (now - geeseRef >= 15000 && maxGeese < 8) {
    maxGeese++;
    lastMaxGeeseIncrease = now;
  }

  // Spawn geese to maintain maxGeese on screen
  while (geese.length < maxGeese) {
    spawnGoose();
  }

  // Update geese
  const toRemove = [];
  for (let i = 0; i < geese.length; i++) {
    const g = geese[i];

    // Trajectory effects
    if (g.trajectory === 'sine') {
      g.wobblePhase += 0.08;
      const wobbleAmount = Math.sin(g.wobblePhase) * 3;
      const perpX = -g.vy;
      const perpY = g.vx;
      const mag = Math.sqrt(perpX * perpX + perpY * perpY);
      if (mag > 0) {
        g.x += (perpX / mag) * wobbleAmount;
        g.y += (perpY / mag) * wobbleAmount;
      }
    } else if (g.trajectory === 'arc') {
      const perpX = -g.vy;
      const perpY = g.vx;
      const mag = Math.sqrt(perpX * perpX + perpY * perpY);
      if (mag > 0) {
        g.vx += (perpX / mag) * g.arcDrift;
        g.vy += (perpY / mag) * g.arcDrift;
      }
    } else if (g.wobbles) {
      g.wobblePhase += 0.05;
      const wobbleAmount = Math.sin(g.wobblePhase) * 0.5;
      const perpX = -g.vy;
      const perpY = g.vx;
      const mag = Math.sqrt(perpX * perpX + perpY * perpY);
      if (mag > 0) {
        g.x += (perpX / mag) * wobbleAmount;
        g.y += (perpY / mag) * wobbleAmount;
      }
    }

    g.x += g.vx;
    g.y += g.vy;
    g.rotation = Math.atan2(g.vy, g.vx);

    // Collision
    if (checkCollision(g)) {
      gameOver();
      return;
    }

    // Off screen
    if (isOffScreen(g)) {
      toRemove.push(i);
      score++;
    }
  }

  // Remove off-screen geese (reverse order)
  for (let i = toRemove.length - 1; i >= 0; i--) {
    geese.splice(toRemove[i], 1);
  }

  // Screen shake
  if (shakeTimer > 0) {
    shakeTimer -= dt;
    shakeIntensity *= 0.95;
  }
}

// ============ RENDER ============

let lastTime = 0;

function render(time) {
  const dt = time - lastTime;
  lastTime = time;

  update(dt);

  ctx.save();

  // Screen shake
  if (shakeTimer > 0 && state === 'gameover') {
    const sx = (Math.random() - 0.5) * shakeIntensity;
    const sy = (Math.random() - 0.5) * shakeIntensity;
    ctx.translate(sx, sy);
  }

  if (state === 'start') {
    drawStartScreen();
  } else if (state === 'playing') {
    drawBackground();
    for (const g of geese) drawGoose(g);
    drawDima(dima.x, dima.y);
    drawBubble();
    drawHUD();
  } else if (state === 'paused') {
    drawBackground();
    for (const g of geese) drawGoose(g);
    drawDima(dima.x, dima.y);
    drawHUD();
    drawPauseMenu();
  } else if (state === 'gameover') {
    drawBackground();
    for (const g of geese) drawGoose(g);
    drawDima(dima.x, dima.y);
    drawHUD();
    drawGameOverScreen();
  }

  ctx.restore();

  requestAnimationFrame(render);
}

// ============ INPUT HANDLING ============

function getEventPos(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

function hitTest(btn, px, py) {
  if (!btn) return false;
  return px >= btn.x && px <= btn.x + btn.w && py >= btn.y && py <= btn.y + btn.h;
}

function handlePointerDown(e) {
  e.preventDefault();
  const pos = getEventPos(e);

  if (state === 'start') {
    if (hitTest(startButton, pos.x, pos.y)) {
      startGame();
    } else if (hitTest(startHubButton, pos.x, pos.y)) {
      if (window.GameHub?.backToHub) {
        window.GameHub.backToHub();
      } else {
        window.location.href = '../../';
      }
    } else {
      for (const card of skinCards) {
        if (hitTest(card, pos.x, pos.y)) {
          selectedSkin = card.idx;
          const jokes = SKIN_JOKES[selectedSkin];
          skinJoke = jokes[Math.floor(Math.random() * jokes.length)];
          break;
        }
      }
    }
    return;
  }

  if (state === 'gameover') {
    if (hitTest(retryButton, pos.x, pos.y)) {
      startGame();
    } else if (hitTest(hubButton, pos.x, pos.y)) {
      if (window.GameHub?.backToHub) {
        window.GameHub.backToHub();
      } else {
        window.location.href = '../../';
      }
    }
    return;
  }

  if (state === 'paused') {
    const btns = window._pauseBtns;
    if (btns) {
      if (hitTest(btns.cont, pos.x, pos.y)) {
        state = 'playing';
      } else if (hitTest(btns.exit, pos.x, pos.y)) {
        state = 'start';
      } else if (hitTest(btns.hub, pos.x, pos.y)) {
        if (window.GameHub?.backToHub) {
          window.GameHub.backToHub();
        } else {
          window.location.href = '../../';
        }
      }
    }
    return;
  }

  if (state === 'playing') {
    if (hitTest(pauseButton, pos.x, pos.y)) {
      state = 'paused';
      return;
    }
    dragging = true;
    dragOffset.x = dima.x - pos.x;
    dragOffset.y = dima.y - pos.y;
  }
}

function handlePointerMove(e) {
  e.preventDefault();
  if (state === 'playing' && dragging) {
    const pos = getEventPos(e);
    dima.x = pos.x + dragOffset.x;
    dima.y = pos.y + dragOffset.y;
    // Clamp
    dima.x = Math.max(DIMA_RADIUS, Math.min(W - DIMA_RADIUS, dima.x));
    dima.y = Math.max(DIMA_RADIUS + 10, Math.min(H - DIMA_RADIUS, dima.y));
  }
}

function handlePointerUp(e) {
  dragging = false;
}

// Mouse events
canvas.addEventListener('mousedown', handlePointerDown);
canvas.addEventListener('mousemove', handlePointerMove);
canvas.addEventListener('mouseup', handlePointerUp);
canvas.addEventListener('mouseleave', handlePointerUp);

// Touch events
canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
canvas.addEventListener('touchend', handlePointerUp);
canvas.addEventListener('touchcancel', handlePointerUp);

// Keyboard
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  if (state === 'start' && (e.code === 'Space' || e.code === 'Enter')) {
    startGame();
  }
  if (state === 'gameover' && (e.code === 'Space' || e.code === 'Enter')) {
    startGame();
  }
  if (e.code === 'Escape') {
    if (state === 'playing') {
      state = 'paused';
    } else if (state === 'paused') {
      state = 'playing';
    }
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// Prevent context menu on long press
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// ============ INIT ============
window.addEventListener('resize', resize);
loadHighScore();
resize();
requestAnimationFrame(render);

</script>
