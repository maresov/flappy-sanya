// ============ PROCEDURAL RATE GENERATION ============
const GENERATED_TARGET_MIN = 75;
const GENERATED_TARGET_MAX = 105;
const GENERATED_TARGET_MID = (GENERATED_TARGET_MIN + GENERATED_TARGET_MAX) / 2; // 90

function ensureRateData(idx) {
  while (idx >= RATE_DATA.length) {
    const prev = RATE_DATA[RATE_DATA.length - 1];
    // Parse previous date and add 7 days
    const d = new Date(prev.date);
    d.setDate(d.getDate() + 7);
    const dateStr = d.toISOString().slice(0, 10);

    // How many generated weeks so far (transition period)
    const genCount = RATE_DATA.length - 211; // 211 = original data length
    // Gradually increase volatility and widen range over ~20 weeks
    const transition = Math.min(genCount / 20, 1);

    // Mean reversion toward GENERATED_TARGET_MID with increasing strength
    const meanRevertStrength = 0.05 * transition;
    const drift = (GENERATED_TARGET_MID - prev.rate) * meanRevertStrength;

    // Volatility: starts small (~1), grows to ~4
    const volatility = 1 + 3 * transition;
    const noise = (Math.random() - 0.5) * 2 * volatility;

    let newRate = prev.rate + drift + noise;
    // Soft clamp to keep within bounds
    if (newRate < GENERATED_TARGET_MIN) newRate = GENERATED_TARGET_MIN + Math.random() * 2;
    if (newRate > GENERATED_TARGET_MAX) newRate = GENERATED_TARGET_MAX - Math.random() * 2;
    newRate = Math.round(newRate * 100) / 100;

    RATE_DATA.push({ date: dateStr, rate: newRate });
  }
}

// ============ COORDINATE MAPPING ============
function rateToY(rate) {
  // rate=RATE_MAX(122) -> y=10 (top), rate=RATE_MIN(72) -> y=CANVAS_H-10 (bottom)
  const t = (rate - RATE_MIN) / (RATE_MAX - RATE_MIN);
  return CANVAS_H - 10 - t * (CANVAS_H - 20);
}

// Mean rate for amplification baseline
const RATE_MEAN = RATE_DATA.reduce((s,d) => s + d.rate, 0) / RATE_DATA.length;

function amplifyRate(rate) {
  // Amplify deviation from mean so ground curve has dramatic swings
  return RATE_MEAN + (rate - RATE_MEAN) * RATE_AMPLIFY;
}

const GROUND_OFFSET_RATIO = 0.33; // push ground line down by 1/3 of screen for flyable space

function getGroundY(px) {
  const dayFloat = (px + scrollX) / DAY_WIDTH;
  const i = Math.floor(dayFloat);
  const frac = dayFloat - i;
  let rate;
  if (i < 0) rate = RATE_DATA[0].rate;
  else {
    ensureRateData(i + 1);
    rate = RATE_DATA[i].rate + (RATE_DATA[i + 1].rate - RATE_DATA[i].rate) * frac;
  }
  return rateToY(amplifyRate(rate)) + CANVAS_H * GROUND_OFFSET_RATIO;
}

function getCurrentDay() {
  return Math.floor(scrollX / DAY_WIDTH);
}

// ============ PRE-RENDER SASHA FACE ============
function createSashaFaceCanvas(size) {
  const faceCanvas = document.createElement('canvas');
  const s = size * 4; // high res
  faceCanvas.width = s;
  faceCanvas.height = s * 1.18;
  const fc = faceCanvas.getContext('2d');
  const cx = s / 2, cy = s / 2, r = s / 2 * 0.88;

  // === HEAD SHAPE - squared jaw like Sasha ===
  fc.beginPath();
  fc.moveTo(cx - r * 0.68, cy - r * 0.45);
  // Left temple to forehead
  fc.quadraticCurveTo(cx - r * 0.68, cy - r * 0.95, cx - r * 0.15, cy - r);
  // Forehead top
  fc.quadraticCurveTo(cx, cy - r * 1.02, cx + r * 0.15, cy - r);
  // Right temple
  fc.quadraticCurveTo(cx + r * 0.68, cy - r * 0.95, cx + r * 0.68, cy - r * 0.45);
  // Right cheek
  fc.lineTo(cx + r * 0.7, cy + r * 0.15);
  // Right jaw - squared
  fc.quadraticCurveTo(cx + r * 0.7, cy + r * 0.65, cx + r * 0.45, cy + r * 0.85);
  // Chin - broad
  fc.quadraticCurveTo(cx + r * 0.2, cy + r * 0.95, cx, cy + r * 0.95);
  fc.quadraticCurveTo(cx - r * 0.2, cy + r * 0.95, cx - r * 0.45, cy + r * 0.85);
  // Left jaw
  fc.quadraticCurveTo(cx - r * 0.7, cy + r * 0.65, cx - r * 0.7, cy + r * 0.15);
  fc.closePath();

  // Multi-stop skin gradient
  const skinGrad = fc.createRadialGradient(cx - r * 0.15, cy - r * 0.25, r * 0.05, cx, cy + r * 0.1, r * 1.1);
  skinGrad.addColorStop(0, '#fde8d0');
  skinGrad.addColorStop(0.3, '#f8d4b0');
  skinGrad.addColorStop(0.6, '#f0c49a');
  skinGrad.addColorStop(1, '#dba678');
  fc.fillStyle = skinGrad;
  fc.fill();

  // Subtle cheek blush
  fc.fillStyle = 'rgba(220,150,130,0.08)';
  fc.beginPath(); fc.ellipse(cx - r * 0.4, cy + r * 0.15, r * 0.2, r * 0.15, 0, 0, Math.PI*2); fc.fill();
  fc.beginPath(); fc.ellipse(cx + r * 0.4, cy + r * 0.15, r * 0.2, r * 0.15, 0, 0, Math.PI*2); fc.fill();

  // Jaw shadow
  fc.fillStyle = 'rgba(180,140,100,0.12)';
  fc.beginPath();
  fc.moveTo(cx - r * 0.7, cy + r * 0.15);
  fc.quadraticCurveTo(cx - r * 0.7, cy + r * 0.65, cx - r * 0.45, cy + r * 0.85);
  fc.quadraticCurveTo(cx, cy + r * 0.95, cx + r * 0.45, cy + r * 0.85);
  fc.quadraticCurveTo(cx + r * 0.7, cy + r * 0.65, cx + r * 0.7, cy + r * 0.15);
  fc.lineTo(cx + r * 0.7, cy + r * 0.4);
  fc.quadraticCurveTo(cx, cy + r * 0.5, cx - r * 0.7, cy + r * 0.4);
  fc.closePath();
  fc.fill();

  // Head outline
  fc.strokeStyle = '#c89870';
  fc.lineWidth = 1.2;
  fc.stroke();

  // === EARS ===
  [[-1, -0.1], [1, 0.1]].forEach(([side, rot]) => {
    const ex = cx + side * r * 0.72;
    // Outer ear
    fc.fillStyle = '#f0c898';
    fc.beginPath();
    fc.ellipse(ex, cy - r * 0.05, r * 0.1, r * 0.22, rot, 0, Math.PI * 2);
    fc.fill();
    // Inner ear shadow
    fc.fillStyle = 'rgba(200,150,110,0.3)';
    fc.beginPath();
    fc.ellipse(ex + side * r * 0.01, cy - r * 0.03, r * 0.05, r * 0.13, rot, 0, Math.PI * 2);
    fc.fill();
    fc.strokeStyle = '#d4a07a'; fc.lineWidth = 0.8; fc.stroke();
  });

  // === HAIR - short buzzcut, Sasha style ===
  // Base hair mass
  const hairGrad = fc.createLinearGradient(cx - r * 0.5, cy - r * 1.1, cx + r * 0.3, cy - r * 0.5);
  hairGrad.addColorStop(0, '#8a7a5a');
  hairGrad.addColorStop(0.4, '#7a6a4f');
  hairGrad.addColorStop(1, '#6a5a40');
  fc.fillStyle = hairGrad;
  fc.beginPath();
  fc.moveTo(cx - r * 0.7, cy - r * 0.48);
  fc.quadraticCurveTo(cx - r * 0.72, cy - r * 1.0, cx - r * 0.2, cy - r * 1.1);
  fc.quadraticCurveTo(cx, cy - r * 1.14, cx + r * 0.2, cy - r * 1.1);
  fc.quadraticCurveTo(cx + r * 0.72, cy - r * 1.0, cx + r * 0.7, cy - r * 0.48);
  fc.quadraticCurveTo(cx + r * 0.68, cy - r * 0.95, cx + r * 0.15, cy - r);
  fc.quadraticCurveTo(cx, cy - r * 1.02, cx - r * 0.15, cy - r);
  fc.quadraticCurveTo(cx - r * 0.68, cy - r * 0.95, cx - r * 0.7, cy - r * 0.48);
  fc.closePath();
  fc.fill();

  // Hair texture - short strands
  fc.strokeStyle = 'rgba(90,75,50,0.5)'; fc.lineWidth = 0.6;
  for (let i = -8; i <= 8; i++) {
    fc.beginPath();
    const hx = cx + i * r * 0.075;
    fc.moveTo(hx, cy - r * 0.98);
    fc.bezierCurveTo(hx + i * 0.3, cy - r * 1.08, hx + i * 1.0, cy - r * 0.85, hx + i * 1.8, cy - r * 0.52);
    fc.stroke();
  }
  // Hair highlight
  fc.fillStyle = 'rgba(160,140,110,0.15)';
  fc.beginPath();
  fc.ellipse(cx - r * 0.15, cy - r * 0.9, r * 0.3, r * 0.12, -0.2, 0, Math.PI * 2);
  fc.fill();

  // Side fade (very short sides)
  fc.fillStyle = 'rgba(110,95,70,0.3)';
  fc.fillRect(cx - r * 0.72, cy - r * 0.48, r * 0.07, r * 0.5);
  fc.fillRect(cx + r * 0.65, cy - r * 0.48, r * 0.07, r * 0.5);
  // Fade dots for buzz effect
  fc.fillStyle = 'rgba(100,85,60,0.2)';
  for (let i = 0; i < 30; i++) {
    const sx = cx + (Math.random() > 0.5 ? 1 : -1) * (r * 0.62 + Math.random() * r * 0.1);
    const sy = cy - r * 0.45 + Math.random() * r * 0.45;
    fc.beginPath(); fc.arc(sx, sy, 0.6 + Math.random() * 0.4, 0, Math.PI * 2); fc.fill();
  }

  // === FOREHEAD LINES (subtle) ===
  fc.strokeStyle = 'rgba(190,155,120,0.12)'; fc.lineWidth = 0.5;
  fc.beginPath(); fc.moveTo(cx - r * 0.3, cy - r * 0.55); fc.quadraticCurveTo(cx, cy - r * 0.57, cx + r * 0.3, cy - r * 0.55); fc.stroke();

  // === EYEBROWS - thick, straight, like Sasha ===
  fc.fillStyle = '#4d3e28';
  [[-1], [1]].forEach(([side]) => {
    const bx = cx + side * r * 0.3;
    fc.beginPath();
    fc.moveTo(bx - side * r * 0.22, cy - r * 0.28);
    fc.quadraticCurveTo(bx, cy - r * 0.4, bx + side * r * 0.22, cy - r * 0.32);
    fc.quadraticCurveTo(bx + side * r * 0.22, cy - r * 0.27, bx + side * r * 0.18, cy - r * 0.26);
    fc.quadraticCurveTo(bx, cy - r * 0.32, bx - side * r * 0.2, cy - r * 0.22);
    fc.closePath();
    fc.fill();
    // Brow hairs
    fc.strokeStyle = 'rgba(70,55,35,0.3)'; fc.lineWidth = 0.4;
    for (let j = 0; j < 6; j++) {
      fc.beginPath();
      const hx = bx - side * r * 0.15 + j * side * r * 0.06;
      fc.moveTo(hx, cy - r * 0.26);
      fc.lineTo(hx + side * r * 0.04, cy - r * 0.35);
      fc.stroke();
    }
  });

  // === EYES - detailed, blue-grey ===
  [[-1, -0.28], [1, 0.28]].forEach(([side, ex]) => {
    const eyeX = cx + r * ex;
    const eyeY = cy - r * 0.1;
    // Socket shadow
    fc.fillStyle = 'rgba(170,130,100,0.2)';
    fc.beginPath(); fc.ellipse(eyeX, eyeY, r * 0.2, r * 0.15, 0, 0, Math.PI * 2); fc.fill();
    // White with subtle veins
    const whiteGrad = fc.createRadialGradient(eyeX, eyeY, 0, eyeX, eyeY, r * 0.16);
    whiteGrad.addColorStop(0, '#faf8f5');
    whiteGrad.addColorStop(0.7, '#f0ece6');
    whiteGrad.addColorStop(1, '#e5ddd5');
    fc.fillStyle = whiteGrad;
    fc.beginPath(); fc.ellipse(eyeX, eyeY, r * 0.17, r * 0.12, 0, 0, Math.PI * 2); fc.fill();
    // Iris - blue-grey with detail
    const irisR = r * 0.1;
    const irisGrad = fc.createRadialGradient(eyeX + side * r * 0.01, eyeY, irisR * 0.2, eyeX + side * r * 0.02, eyeY + r * 0.01, irisR);
    irisGrad.addColorStop(0, '#7ea8c4');
    irisGrad.addColorStop(0.5, '#5e8aa8');
    irisGrad.addColorStop(0.8, '#4a7590');
    irisGrad.addColorStop(1, '#3a6070');
    fc.fillStyle = irisGrad;
    fc.beginPath(); fc.arc(eyeX + side * r * 0.02, eyeY + r * 0.01, irisR, 0, Math.PI * 2); fc.fill();
    // Iris ring
    fc.strokeStyle = 'rgba(50,80,100,0.4)'; fc.lineWidth = 0.8;
    fc.beginPath(); fc.arc(eyeX + side * r * 0.02, eyeY + r * 0.01, irisR, 0, Math.PI * 2); fc.stroke();
    // Pupil
    fc.fillStyle = '#111820';
    fc.beginPath(); fc.arc(eyeX + side * r * 0.02, eyeY + r * 0.01, irisR * 0.45, 0, Math.PI * 2); fc.fill();
    // Highlight
    fc.fillStyle = 'rgba(255,255,255,0.85)';
    fc.beginPath(); fc.arc(eyeX + side * r * 0.0 - r * 0.02, eyeY - r * 0.03, irisR * 0.25, 0, Math.PI * 2); fc.fill();
    // Secondary highlight
    fc.fillStyle = 'rgba(255,255,255,0.3)';
    fc.beginPath(); fc.arc(eyeX + side * r * 0.04, eyeY + r * 0.04, irisR * 0.12, 0, Math.PI * 2); fc.fill();
    // Upper eyelid
    fc.strokeStyle = '#7a6050'; fc.lineWidth = 1.2;
    fc.beginPath(); fc.arc(eyeX, eyeY, r * 0.17, -Math.PI * 0.85, -Math.PI * 0.15); fc.stroke();
    // Lower eyelid (subtle)
    fc.strokeStyle = 'rgba(150,120,95,0.3)'; fc.lineWidth = 0.6;
    fc.beginPath(); fc.arc(eyeX, eyeY, r * 0.16, Math.PI * 0.15, Math.PI * 0.85); fc.stroke();
    // Eyelashes (top - subtle)
    fc.strokeStyle = 'rgba(80,60,40,0.4)'; fc.lineWidth = 0.5;
    for (let j = 0; j < 4; j++) {
      const a = -Math.PI * 0.75 + j * Math.PI * 0.15;
      fc.beginPath();
      fc.moveTo(eyeX + Math.cos(a) * r * 0.17, eyeY + Math.sin(a) * r * 0.12);
      fc.lineTo(eyeX + Math.cos(a) * r * 0.21, eyeY + Math.sin(a) * r * 0.15);
      fc.stroke();
    }
  });

  // === NOSE - straight, slightly wide ===
  // Bridge
  fc.strokeStyle = 'rgba(190,150,115,0.4)'; fc.lineWidth = 1.0;
  fc.beginPath();
  fc.moveTo(cx + r * 0.01, cy - r * 0.1);
  fc.bezierCurveTo(cx - r * 0.02, cy + r * 0.05, cx - r * 0.04, cy + r * 0.15, cx - r * 0.05, cy + r * 0.2);
  fc.stroke();
  // Nose tip and wings
  fc.strokeStyle = 'rgba(180,140,105,0.5)'; fc.lineWidth = 1.0;
  fc.beginPath();
  fc.moveTo(cx - r * 0.12, cy + r * 0.22);
  fc.quadraticCurveTo(cx - r * 0.08, cy + r * 0.27, cx, cy + r * 0.26);
  fc.quadraticCurveTo(cx + r * 0.08, cy + r * 0.27, cx + r * 0.12, cy + r * 0.22);
  fc.stroke();
  // Nostrils
  fc.fillStyle = 'rgba(160,120,85,0.35)';
  fc.beginPath(); fc.ellipse(cx - r * 0.06, cy + r * 0.23, r * 0.04, r * 0.022, -0.2, 0, Math.PI * 2); fc.fill();
  fc.beginPath(); fc.ellipse(cx + r * 0.06, cy + r * 0.23, r * 0.04, r * 0.022, 0.2, 0, Math.PI * 2); fc.fill();
  // Nose shadow
  fc.fillStyle = 'rgba(170,130,95,0.1)';
  fc.beginPath(); fc.ellipse(cx, cy + r * 0.2, r * 0.1, r * 0.06, 0, 0, Math.PI); fc.fill();

  // === NASOLABIAL FOLDS ===
  fc.strokeStyle = 'rgba(180,145,110,0.2)'; fc.lineWidth = 0.9;
  [[-1], [1]].forEach(([d]) => {
    fc.beginPath();
    fc.moveTo(cx + d * r * 0.18, cy + r * 0.06);
    fc.bezierCurveTo(cx + d * r * 0.24, cy + r * 0.2, cx + d * r * 0.26, cy + r * 0.32, cx + d * r * 0.22, cy + r * 0.4);
    fc.stroke();
  });

  // === MOUTH - asymmetric smirk like Sasha ===
  // Lip line
  fc.strokeStyle = '#a86558'; fc.lineWidth = 1.3;
  fc.beginPath();
  fc.moveTo(cx - r * 0.2, cy + r * 0.4);
  fc.bezierCurveTo(cx - r * 0.1, cy + r * 0.42, cx - r * 0.02, cy + r * 0.46, cx + r * 0.03, cy + r * 0.44);
  fc.bezierCurveTo(cx + r * 0.1, cy + r * 0.41, cx + r * 0.16, cy + r * 0.39, cx + r * 0.22, cy + r * 0.41);
  fc.stroke();
  // Upper lip cupid's bow
  fc.fillStyle = 'rgba(190,110,90,0.15)';
  fc.beginPath();
  fc.moveTo(cx - r * 0.15, cy + r * 0.38);
  fc.quadraticCurveTo(cx - r * 0.05, cy + r * 0.35, cx, cy + r * 0.37);
  fc.quadraticCurveTo(cx + r * 0.05, cy + r * 0.35, cx + r * 0.15, cy + r * 0.38);
  fc.quadraticCurveTo(cx, cy + r * 0.43, cx - r * 0.15, cy + r * 0.38);
  fc.fill();
  // Lower lip
  fc.fillStyle = 'rgba(200,120,100,0.12)';
  fc.beginPath();
  fc.moveTo(cx - r * 0.15, cy + r * 0.42);
  fc.quadraticCurveTo(cx, cy + r * 0.52, cx + r * 0.18, cy + r * 0.43);
  fc.quadraticCurveTo(cx, cy + r * 0.46, cx - r * 0.15, cy + r * 0.42);
  fc.fill();
  // Lip corners slight shadow
  fc.fillStyle = 'rgba(150,100,80,0.15)';
  fc.beginPath(); fc.arc(cx - r * 0.21, cy + r * 0.41, r * 0.025, 0, Math.PI*2); fc.fill();
  fc.beginPath(); fc.arc(cx + r * 0.23, cy + r * 0.42, r * 0.025, 0, Math.PI*2); fc.fill();

  // === CHIN DIMPLE (subtle) ===
  fc.fillStyle = 'rgba(170,130,95,0.1)';
  fc.beginPath(); fc.ellipse(cx, cy + r * 0.7, r * 0.06, r * 0.04, 0, 0, Math.PI * 2); fc.fill();

  // === STUBBLE - realistic pattern ===
  const stubbleSeeds = [];
  for (let i = 0; i < 120; i++) {
    stubbleSeeds.push([
      cx + (Math.random() - 0.5) * r * 1.1,
      cy + r * 0.3 + Math.random() * r * 0.65,
      0.3 + Math.random() * 0.6
    ]);
  }
  stubbleSeeds.forEach(([sx, sy, sr]) => {
    // Only draw if inside face area
    const dx = (sx - cx) / (r * 0.7);
    const dy = (sy - cy) / (r * 0.95);
    if (dx * dx + dy * dy < 1.1 && sy > cy + r * 0.25) {
      fc.fillStyle = `rgba(85,70,50,${0.04 + Math.random() * 0.04})`;
      fc.beginPath(); fc.arc(sx, sy, sr, 0, Math.PI * 2); fc.fill();
    }
  });

  // === TEMPLE SHADOW ===
  fc.fillStyle = 'rgba(160,120,85,0.08)';
  fc.beginPath(); fc.ellipse(cx - r * 0.55, cy - r * 0.25, r * 0.12, r * 0.25, 0.2, 0, Math.PI*2); fc.fill();
  fc.beginPath(); fc.ellipse(cx + r * 0.55, cy - r * 0.25, r * 0.12, r * 0.25, -0.2, 0, Math.PI*2); fc.fill();

  // === NECK ===
  fc.fillStyle = '#e8ba8a';
  fc.beginPath();
  fc.moveTo(cx - r * 0.28, cy + r * 0.92);
  fc.lineTo(cx - r * 0.3, cy + r * 1.15);
  fc.lineTo(cx + r * 0.3, cy + r * 1.15);
  fc.lineTo(cx + r * 0.28, cy + r * 0.92);
  fc.closePath();
  fc.fill();
  // Neck shadow
  fc.fillStyle = 'rgba(180,140,100,0.15)';
  fc.fillRect(cx - r * 0.28, cy + r * 0.92, r * 0.56, r * 0.08);

  return faceCanvas;
}

const faceTiny = createSashaFaceCanvas(12);
const faceSmall = createSashaFaceCanvas(20);
const faceMedium = createSashaFaceCanvas(32);
const faceLarge = createSashaFaceCanvas(56);

function drawSashaFace(cx, cy, size) {
  let f;
  if (size <= 15) f = faceTiny;
  else if (size <= 24) f = faceSmall;
  else if (size <= 40) f = faceMedium;
  else f = faceLarge;
  const w = size, h = size * (f.height / f.width);
  ctx.drawImage(f, cx - w / 2, cy - h / 2, w, h);
}

// ============ CHARACTER SKINS ============
function drawRocket(cx, cy, s) {
  s = s || 1;
  // Main body with gradient
  const bodyGrad = ctx.createLinearGradient(cx - 15 * s, cy - 18 * s, cx - 15 * s, cy + 18 * s);
  bodyGrad.addColorStop(0, '#ff4444');
  bodyGrad.addColorStop(0.5, '#cc2233');
  bodyGrad.addColorStop(1, '#991122');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.moveTo(cx + 30 * s, cy - 16 * s);
  ctx.lineTo(cx + 42 * s, cy);
  ctx.lineTo(cx + 30 * s, cy + 16 * s);
  ctx.lineTo(cx - 20 * s, cy + 16 * s);
  ctx.lineTo(cx - 20 * s, cy - 16 * s);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#880015'; ctx.lineWidth = 2 * s; ctx.stroke();

  // Metallic nose cone
  const noseGrad = ctx.createLinearGradient(cx + 30 * s, cy - 16 * s, cx + 30 * s, cy + 16 * s);
  noseGrad.addColorStop(0, '#ff8888');
  noseGrad.addColorStop(0.5, '#ff5555');
  noseGrad.addColorStop(1, '#cc3333');
  ctx.fillStyle = noseGrad;
  ctx.beginPath();
  ctx.moveTo(cx + 30 * s, cy - 16 * s);
  ctx.lineTo(cx + 50 * s, cy);
  ctx.lineTo(cx + 30 * s, cy + 16 * s);
  ctx.closePath();
  ctx.fill();

  // Rivets along body
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.arc(cx + i * 12 * s, cy - 14 * s, 1.5 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + i * 12 * s, cy + 14 * s, 1.5 * s, 0, Math.PI * 2);
    ctx.fill();
  }

  // Stripe
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(cx - 18 * s, cy - 3 * s, 46 * s, 6 * s);

  // Window with reflection
  ctx.fillStyle = '#87CEEB';
  ctx.beginPath();
  ctx.arc(cx + 8 * s, cy, 12 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#4682B4'; ctx.lineWidth = 2 * s; ctx.stroke();
  // Window reflection
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.ellipse(cx + 5 * s, cy - 4 * s, 5 * s, 8 * s, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Sasha in window
  drawSashaFace(cx + 8 * s, cy, 20 * s);

  // Fins with gradient
  const finGrad = ctx.createLinearGradient(cx - 30 * s, 0, cx - 15 * s, 0);
  finGrad.addColorStop(0, '#1d3557');
  finGrad.addColorStop(1, '#2a5580');
  ctx.fillStyle = finGrad;
  ctx.beginPath();
  ctx.moveTo(cx - 20 * s, cy - 16 * s);
  ctx.lineTo(cx - 32 * s, cy - 28 * s);
  ctx.lineTo(cx - 10 * s, cy - 16 * s);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx - 20 * s, cy + 16 * s);
  ctx.lineTo(cx - 32 * s, cy + 28 * s);
  ctx.lineTo(cx - 10 * s, cy + 16 * s);
  ctx.closePath();
  ctx.fill();

  // Animated flame
  const t = Date.now() / 50;
  const fl1 = 8 + Math.sin(t) * 5;
  const fl2 = 5 + Math.cos(t * 1.3) * 3;
  // Outer flame
  ctx.fillStyle = '#f4a261';
  ctx.beginPath();
  ctx.moveTo(cx - 20 * s, cy - 12 * s);
  ctx.quadraticCurveTo(cx - (30 + fl1) * s, cy - 5 * s, cx - (35 + fl1) * s, cy);
  ctx.quadraticCurveTo(cx - (30 + fl1) * s, cy + 5 * s, cx - 20 * s, cy + 12 * s);
  ctx.closePath();
  ctx.fill();
  // Inner flame
  ctx.fillStyle = '#e9c46a';
  ctx.beginPath();
  ctx.moveTo(cx - 20 * s, cy - 6 * s);
  ctx.quadraticCurveTo(cx - (22 + fl2) * s, cy - 2 * s, cx - (26 + fl2) * s, cy);
  ctx.quadraticCurveTo(cx - (22 + fl2) * s, cy + 2 * s, cx - 20 * s, cy + 6 * s);
  ctx.closePath();
  ctx.fill();
  // White hot core
  ctx.fillStyle = 'rgba(255,255,200,0.6)';
  ctx.beginPath();
  ctx.moveTo(cx - 20 * s, cy - 3 * s);
  ctx.quadraticCurveTo(cx - 24 * s, cy, cx - 20 * s, cy + 3 * s);
  ctx.closePath();
  ctx.fill();
}

function drawCar(cx, cy, s) {
  s = s || 1;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 18 * s, 34 * s, 5 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Audi A5 coupe body — sleek, low profile, green
  const bodyGrad = ctx.createLinearGradient(cx, cy - 12 * s, cx, cy + 14 * s);
  bodyGrad.addColorStop(0, '#2E7D32');
  bodyGrad.addColorStop(0.5, '#1B5E20');
  bodyGrad.addColorStop(1, '#0D3B0F');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  // Sleek coupe silhouette — longer, lower
  ctx.moveTo(cx + 36 * s, cy + 4 * s);   // front bumper top
  ctx.quadraticCurveTo(cx + 40 * s, cy + 6 * s, cx + 38 * s, cy + 12 * s); // front curve down
  ctx.lineTo(cx - 30 * s, cy + 12 * s);  // bottom
  ctx.quadraticCurveTo(cx - 34 * s, cy + 10 * s, cx - 34 * s, cy + 4 * s); // rear curve
  ctx.lineTo(cx - 32 * s, cy - 6 * s);   // rear panel
  ctx.lineTo(cx + 30 * s, cy - 6 * s);   // hood line
  ctx.quadraticCurveTo(cx + 38 * s, cy - 4 * s, cx + 36 * s, cy + 4 * s);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#0a2e0a'; ctx.lineWidth = 1.5 * s; ctx.stroke();

  // Body highlight (metallic sheen)
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.moveTo(cx - 28 * s, cy - 5 * s);
  ctx.lineTo(cx + 32 * s, cy - 5 * s);
  ctx.quadraticCurveTo(cx + 36 * s, cy - 3 * s, cx + 34 * s, cy);
  ctx.lineTo(cx - 28 * s, cy);
  ctx.closePath();
  ctx.fill();

  // Roof/cabin — Audi A5 coupe roofline (low, swept back)
  const roofGrad = ctx.createLinearGradient(cx, cy - 28 * s, cx, cy - 6 * s);
  roofGrad.addColorStop(0, '#388E3C');
  roofGrad.addColorStop(1, '#2E7D32');
  ctx.fillStyle = roofGrad;
  ctx.beginPath();
  ctx.moveTo(cx - 4 * s, cy - 6 * s);     // A-pillar base
  ctx.lineTo(cx - 2 * s, cy - 24 * s);     // A-pillar top
  ctx.quadraticCurveTo(cx + 6 * s, cy - 28 * s, cx + 14 * s, cy - 26 * s); // roof arc
  ctx.quadraticCurveTo(cx + 22 * s, cy - 22 * s, cx + 26 * s, cy - 6 * s); // C-pillar sweep
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#1a5c1a'; ctx.lineWidth = 1.2 * s; ctx.stroke();

  // Rear window (small, coupe style)
  ctx.fillStyle = 'rgba(130,200,230,0.5)';
  ctx.beginPath();
  ctx.moveTo(cx + 16 * s, cy - 8 * s);
  ctx.lineTo(cx + 17 * s, cy - 20 * s);
  ctx.quadraticCurveTo(cx + 22 * s, cy - 18 * s, cx + 24 * s, cy - 8 * s);
  ctx.closePath();
  ctx.fill();

  // Windshield — wider, sportier angle
  const windGrad = ctx.createLinearGradient(cx, cy - 26 * s, cx, cy - 8 * s);
  windGrad.addColorStop(0, '#B3E5FC');
  windGrad.addColorStop(1, '#81D4FA');
  ctx.fillStyle = windGrad;
  ctx.beginPath();
  ctx.moveTo(cx - 2 * s, cy - 8 * s);
  ctx.lineTo(cx, cy - 22 * s);
  ctx.lineTo(cx + 15 * s, cy - 22 * s);
  ctx.lineTo(cx + 15 * s, cy - 8 * s);
  ctx.closePath();
  ctx.fill();

  // Windshield reflection
  ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 0.8 * s;
  ctx.beginPath();
  ctx.moveTo(cx + 10 * s, cy - 20 * s);
  ctx.lineTo(cx + 12 * s, cy - 10 * s);
  ctx.stroke();

  // Sasha in windshield
  drawSashaFace(cx + 7 * s, cy - 15 * s, 14 * s);

  // Door line
  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 0.8 * s;
  ctx.beginPath();
  ctx.moveTo(cx + 2 * s, cy - 6 * s);
  ctx.lineTo(cx + 2 * s, cy + 10 * s);
  ctx.stroke();

  // Door handle (chrome)
  ctx.fillStyle = '#c0c0c0';
  ctx.beginPath();
  ctx.roundRect(cx - 4 * s, cy + 1 * s, 6 * s, 2 * s, 1 * s);
  ctx.fill();

  // Audi rings hint (front grille area)
  ctx.strokeStyle = 'rgba(200,200,200,0.4)'; ctx.lineWidth = 0.6 * s;
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.arc(cx + (34 + i * 2.5) * s, cy + 3 * s, 1.5 * s, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Wheels — sportier, bigger
  [[-20], [22]].forEach(([wx]) => {
    // Tire
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(cx + wx * s, cy + 12 * s, 9 * s, 0, Math.PI * 2);
    ctx.fill();
    // Tire sidewall
    ctx.strokeStyle = '#333'; ctx.lineWidth = 1 * s;
    ctx.stroke();
    // Rim — 5-spoke alloy style
    const rimGrad = ctx.createRadialGradient(cx + wx * s, cy + 12 * s, 0, cx + wx * s, cy + 12 * s, 6 * s);
    rimGrad.addColorStop(0, '#f0f0f0');
    rimGrad.addColorStop(0.6, '#c0c0c0');
    rimGrad.addColorStop(1, '#888');
    ctx.fillStyle = rimGrad;
    ctx.beginPath();
    ctx.arc(cx + wx * s, cy + 12 * s, 5.5 * s, 0, Math.PI * 2);
    ctx.fill();
    // Spokes
    ctx.strokeStyle = 'rgba(80,80,80,0.4)'; ctx.lineWidth = 0.8 * s;
    for (let j = 0; j < 5; j++) {
      const a = j * Math.PI * 2 / 5 - Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(cx + wx * s, cy + 12 * s);
      ctx.lineTo(cx + wx * s + Math.cos(a) * 5 * s, cy + 12 * s + Math.sin(a) * 5 * s);
      ctx.stroke();
    }
    // Center cap
    ctx.fillStyle = '#ddd';
    ctx.beginPath();
    ctx.arc(cx + wx * s, cy + 12 * s, 1.5 * s, 0, Math.PI * 2);
    ctx.fill();
  });

  // Headlights — LED style
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#fff'; ctx.shadowBlur = 5 * s;
  ctx.beginPath();
  ctx.ellipse(cx + 37 * s, cy + 1 * s, 2 * s, 4 * s, 0.1, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // DRL strip
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1 * s;
  ctx.beginPath();
  ctx.moveTo(cx + 35 * s, cy - 3 * s);
  ctx.lineTo(cx + 38 * s, cy - 1 * s);
  ctx.stroke();

  // Tail lights — LED strip
  ctx.fillStyle = '#f44336';
  ctx.shadowColor = '#f44336'; ctx.shadowBlur = 4 * s;
  ctx.beginPath();
  ctx.moveTo(cx - 32 * s, cy - 2 * s);
  ctx.lineTo(cx - 34 * s, cy);
  ctx.lineTo(cx - 34 * s, cy + 6 * s);
  ctx.lineTo(cx - 32 * s, cy + 8 * s);
  ctx.lineWidth = 2 * s;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Exhaust tips (dual)
  ctx.fillStyle = '#555';
  ctx.beginPath(); ctx.ellipse(cx - 28 * s, cy + 12 * s, 2 * s, 1.5 * s, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx - 24 * s, cy + 12 * s, 2 * s, 1.5 * s, 0, 0, Math.PI * 2); ctx.fill();

  // Exhaust puffs
  const t = Date.now() / 200;
  for (let i = 0; i < 3; i++) {
    const px = cx - 34 * s - i * 7 * s - Math.sin(t + i) * 3 * s;
    const py = cy + 10 * s - i * 2 * s;
    const pr = (2.5 + i * 1.8) * s;
    ctx.fillStyle = `rgba(180,180,180,${0.25 - i * 0.08})`;
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawWalking(cx, cy, s) {
  s = s || 1;
  const t = Date.now() / 100;
  const legAnim = Math.sin(t) * 10 * s;
  const armAnim = Math.sin(t + Math.PI) * 12 * s;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 42 * s, 14 * s, 4 * s, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs (jeans)
  ctx.lineCap = 'round';
  [[-5, legAnim], [5, -legAnim]].forEach(([lx, la]) => {
    // Thigh
    ctx.strokeStyle = '#1565C0'; ctx.lineWidth = 6 * s;
    ctx.beginPath();
    ctx.moveTo(cx + lx * s, cy + 20 * s);
    ctx.lineTo(cx + lx * s + la * 0.5, cy + 32 * s);
    ctx.stroke();
    // Shin
    ctx.strokeStyle = '#0D47A1';
    ctx.beginPath();
    ctx.moveTo(cx + lx * s + la * 0.5, cy + 32 * s);
    ctx.lineTo(cx + lx * s + la, cy + 40 * s);
    ctx.stroke();
  });

  // Shoes
  ctx.fillStyle = '#333';
  [[-5, legAnim], [5, -legAnim]].forEach(([lx, la]) => {
    ctx.beginPath();
    ctx.ellipse(cx + lx * s + la, cy + 42 * s, 6 * s, 3 * s, la * 0.02, 0, Math.PI * 2);
    ctx.fill();
    // Sole
    ctx.fillStyle = '#555';
    ctx.fillRect(cx + lx * s + la - 5 * s, cy + 43 * s, 10 * s, 2 * s);
    ctx.fillStyle = '#333';
  });

  // T-shirt body with gradient (blue)
  const shirtGrad = ctx.createLinearGradient(cx, cy - 4 * s, cx, cy + 22 * s);
  shirtGrad.addColorStop(0, '#42A5F5');
  shirtGrad.addColorStop(1, '#1565C0');
  ctx.fillStyle = shirtGrad;
  ctx.beginPath();
  ctx.roundRect(cx - 14 * s, cy - 4 * s, 28 * s, 26 * s, 4 * s);
  ctx.fill();
  ctx.strokeStyle = '#0D47A1'; ctx.lineWidth = 1.5 * s; ctx.stroke();

  // Collar
  ctx.strokeStyle = '#0D47A1'; ctx.lineWidth = 1.5 * s;
  ctx.beginPath();
  ctx.moveTo(cx - 6 * s, cy - 4 * s);
  ctx.lineTo(cx, cy + 2 * s);
  ctx.lineTo(cx + 6 * s, cy - 4 * s);
  ctx.stroke();

  // Shirt wrinkle
  ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1 * s;
  ctx.beginPath();
  ctx.moveTo(cx - 4 * s, cy + 8 * s);
  ctx.quadraticCurveTo(cx, cy + 10 * s, cx + 4 * s, cy + 8 * s);
  ctx.stroke();

  // Arms with hands
  ctx.lineCap = 'round';
  [[-1, armAnim], [1, -armAnim]].forEach(([d, aa]) => {
    // Upper arm
    ctx.strokeStyle = '#f5d0a9'; ctx.lineWidth = 5 * s;
    ctx.beginPath();
    ctx.moveTo(cx + d * 14 * s, cy + 2 * s);
    ctx.lineTo(cx + d * 20 * s + aa * 0.3, cy + 14 * s);
    ctx.stroke();
    // Forearm
    ctx.strokeStyle = '#edc09a'; ctx.lineWidth = 4 * s;
    ctx.beginPath();
    ctx.moveTo(cx + d * 20 * s + aa * 0.3, cy + 14 * s);
    ctx.lineTo(cx + d * 22 * s + aa * 0.7, cy + 22 * s);
    ctx.stroke();
    // Hand
    ctx.fillStyle = '#f5d0a9';
    ctx.beginPath();
    ctx.arc(cx + d * 22 * s + aa * 0.7, cy + 23 * s, 3 * s, 0, Math.PI * 2);
    ctx.fill();
  });

  // Head
  drawSashaFace(cx, cy - 18 * s, 32 * s);
}

function drawPlayer(cx, cy) {
  ctx.save();
  const angle = Math.max(-0.3, Math.min(0.3, playerVY * 0.03));
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  if (selectedSkin === 0) drawRocket(0, 0, PLAYER_SCALE);
  else if (selectedSkin === 1) drawCar(0, 0, PLAYER_SCALE);
  else drawWalking(0, 0, PLAYER_SCALE);
  ctx.restore();
}

// ============ COLLISION ============
function getPlayerBounds() {
  const cx = PLAYER_X, cy = playerY, s = PLAYER_SCALE;
  if (selectedSkin === 0) return { x: cx - 20 * s, y: cy - 16 * s, w: 70 * s, h: 32 * s };
  if (selectedSkin === 1) return { x: cx - 32 * s, y: cy - 30 * s, w: 64 * s, h: 44 * s };
  return { x: cx - 14 * s, y: cy - 18 * s, w: 28 * s, h: 60 * s };
}

function checkCollision() {
  const b = getPlayerBounds();
  const ceilingY = rateToY(CEILING_RATE);
  if (b.y < ceilingY) return true;
  for (let px = b.x; px <= b.x + b.w; px += 5) {
    if (b.y + b.h > getGroundY(px)) return true;
  }
  return false;
}

// ============ DRAW HELPERS ============
function drawBackground() {
  const grad = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  grad.addColorStop(0, '#0a1628');
  grad.addColorStop(0.5, '#1a2a4a');
  grad.addColorStop(1, '#2a3a5a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 60; i++) {
    ctx.beginPath();
    ctx.arc((i * 137 + 50) % CANVAS_W, (i * 97 + 30) % (CANVAS_H * 0.7), 0.5 + (i % 3) * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGround() {
  ctx.fillStyle = 'rgba(0,200,100,0.08)';
  ctx.beginPath();
  ctx.moveTo(0, CANVAS_H);
  for (let px = 0; px <= CANVAS_W; px += 3) ctx.lineTo(px, getGroundY(px));
  ctx.lineTo(CANVAS_W, CANVAS_H);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#00e676'; ctx.lineWidth = 3;
  ctx.shadowColor = '#00e676'; ctx.shadowBlur = 8;
  ctx.beginPath();
  for (let px = 0; px <= CANVAS_W; px += 2) {
    const y = getGroundY(px);
    px === 0 ? ctx.moveTo(px, y) : ctx.lineTo(px, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Labels
  for (let px = 0; px <= CANVAS_W; px += DAY_WIDTH) {
    const dayIdx = Math.floor((px + scrollX) / DAY_WIDTH);
    if (dayIdx >= 0) {
      ensureRateData(dayIdx);
      const y = getGroundY(px);
      const actualPx = px - (scrollX % DAY_WIDTH);
      if (actualPx > 10 && actualPx < CANVAS_W - 40) {
        const gfs = IS_PORTRAIT ? 12 : 9;
        ctx.fillStyle = 'rgba(0,230,118,0.7)';
        ctx.font = `${gfs}px monospace`;
        ctx.fillText(RATE_DATA[dayIdx].rate.toFixed(1), actualPx - 12, y + 14);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText(RATE_DATA[dayIdx].date.slice(5), actualPx - 12, y + 14 + gfs + 2);
      }
    }
  }
}

function drawCeiling() {
  const ceilingY = rateToY(CEILING_RATE);
  // Danger zone
  ctx.fillStyle = 'rgba(255,23,68,0.04)';
  ctx.fillRect(0, 0, CANVAS_W, ceilingY);
  // Line
  ctx.strokeStyle = '#ff1744'; ctx.lineWidth = 2;
  ctx.setLineDash([8, 4]);
  ctx.beginPath();
  ctx.moveTo(0, ceilingY);
  ctx.lineTo(CANVAS_W, ceilingY);
  ctx.stroke();
  ctx.setLineDash([]);
  // Label
  ctx.fillStyle = '#ff1744';
  ctx.font = `bold ${IS_PORTRAIT ? 14 : 11}px monospace`;
  ctx.fillText('118₽ — ВЫ КУПИЛИ ТУТ', IS_PORTRAIT ? 12 : 10, ceilingY - (IS_PORTRAIT ? 8 : 5));
}

function drawHUD() {
  const P = IS_PORTRAIT;
  const day = getCurrentDay();
  ensureRateData(day);
  const currentDate = RATE_DATA[day].date;
  const currentRate = RATE_DATA[day].rate;
  const hudY = rateToY(CEILING_RATE) + (P ? 28 : 20);
  const pad = P ? 12 : 0;

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${P ? 32 : 22}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`${score} нед.`, CANVAS_W / 2, hudY);

  ctx.font = `${P ? 16 : 11}px monospace`;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText(`${currentDate}  |  $1 = ${currentRate.toFixed(2)}₽`, CANVAS_W / 2, hudY + (P ? 26 : 18));

  if (highScore > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = `${P ? 14 : 10}px monospace`;
    ctx.fillText(`Рекорд: ${highScore} нед.`, CANVAS_W / 2, hudY + (P ? 46 : 32));
  }
  ctx.textAlign = 'left';

  // Pause button (top-right corner)
  if (state === 'playing') {
    const pbSize = P ? 44 : 34;
    const pbX = CANVAS_W - pbSize - (P ? 8 : 6);
    const pbY = P ? 8 : 6;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.roundRect(pbX, pbY, pbSize, pbSize, 8); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `${P ? 24 : 18}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('⏸', pbX + pbSize / 2, pbY + pbSize * 0.7);
    ctx.textAlign = 'left';
    window._pauseBtn = { x: pbX, y: pbY, w: pbSize, h: pbSize };
  }

  // Y-axis labels
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = `${P ? 12 : 9}px monospace`;
  for (let r = 55; r <= 115; r += 10) {
    const y = rateToY(r);
    ctx.fillText(r + '₽', CANVAS_W - (P ? 40 : 32), y + 3);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W - (P ? 44 : 36), y); ctx.stroke();
  }
}

function drawWrappedText(text, x, y, maxW, lineH) {
  ctx.textAlign = 'center';
  const lines = text.split('\n');
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineH));
  return lines.length;
}

// ============ MENU ============
function drawMenu() {
  drawBackground();
  const P = IS_PORTRAIT;
  const cx = CANVAS_W / 2;
  const skins = ['Ракета', 'Машина', 'Пешком'];
  const skinColors = ['#e63946', '#2E7D32', '#4CAF50'];

  if (P) {
    // ===== PORTRAIT: Fill entire screen, button pinned to bottom =====
    const pad = CANVAS_W * 0.08;
    const textW = CANVAS_W - pad * 2;
    const btnH = 56;
    const btnW = CANVAS_W * 0.65;
    const bottomPad = 16;
    const hintH = 18;

    // Pin button + hint to bottom
    const hintY = CANVAS_H - bottomPad;
    const startBtnY = hintY - hintH - 8 - btnH;

    // Available space for content above button
    const contentBottom = startBtnY - 12;
    const cardSize = Math.min((CANVAS_W - pad * 2 - 16) / 3, 120);
    const cardGap = 8;

    // Count content blocks and distribute spacing evenly
    // Blocks: title, subtitle, menuJoke, [record], skinLabel, cards, skinJoke
    const numBlocks = highScore > 0 ? 7 : 6;
    const blockHeights = [52, 20, 70, cardSize, 90]; // title, sub, joke, cards, skinJoke
    if (highScore > 0) blockHeights.splice(3, 0, 28); // record
    blockHeights.splice(3 + (highScore > 0 ? 1 : 0), 0, 28); // label
    const totalFixed = blockHeights.reduce((a,b) => a + b, 0);
    const gap = Math.max(8, (contentBottom - totalFixed) / (numBlocks + 1));

    let y = gap;

    // Title
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    const titlePad = 20;
    const maxTitleW = CANVAS_W - titlePad * 2;
    let titleFontSize = 48;
    ctx.font = `bold ${titleFontSize}px monospace`;
    while (ctx.measureText('FLAPPY САНЯ').width > maxTitleW && titleFontSize > 20) {
      titleFontSize -= 2;
      ctx.font = `bold ${titleFontSize}px monospace`;
    }
    ctx.fillText('FLAPPY САНЯ', cx, y + 44);
    y += 52 + gap;

    // Subtitle
    ctx.font = '18px monospace';
    ctx.fillStyle = '#a0c4ff';
    ctx.fillText('Пролети через курс доллара!', cx, y + 16);
    y += 20 + gap;

    // Menu joke
    ctx.fillStyle = '#ffa726';
    ctx.font = '15px monospace';
    const jLines = drawWrappedText(menuJoke, cx, y + 14, textW, 20);
    y += jLines * 20 + gap;

    // Record
    if (highScore > 0) {
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 20px monospace';
      ctx.fillText(`Рекорд: ${highScore} нед.`, cx, y + 18);
      y += 28 + gap;
    }

    // Skin label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('Выберите лук:', cx, y + 20);
    y += 28 + gap;

    // 3 near-square cards
    const totalCardW = cardSize * 3 + cardGap * 2;
    const cardStartX = (CANVAS_W - totalCardW) / 2;
    const skinStartY = y;
    const iconScales = [0.65, 0.6, 0.5];

    for (let i = 0; i < 3; i++) {
      const bx = cardStartX + i * (cardSize + cardGap);
      const by = skinStartY;

      ctx.fillStyle = selectedSkin === i ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.07)';
      ctx.beginPath(); ctx.roundRect(bx, by, cardSize, cardSize, 12); ctx.fill();
      ctx.strokeStyle = selectedSkin === i ? skinColors[i] : 'rgba(255,255,255,0.2)';
      ctx.lineWidth = selectedSkin === i ? 4 : 1.5;
      ctx.beginPath(); ctx.roundRect(bx, by, cardSize, cardSize, 12); ctx.stroke();

      ctx.save();
      const iconCx = bx + cardSize / 2;
      const iconCy = by + cardSize * 0.4;
      if (i === 0) drawRocket(iconCx, iconCy, iconScales[i]);
      else if (i === 1) drawCar(iconCx, iconCy, iconScales[i]);
      else drawWalking(iconCx, iconCy, iconScales[i]);
      ctx.restore();

      ctx.fillStyle = selectedSkin === i ? skinColors[i] : '#ccc';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(skins[i], bx + cardSize / 2, by + cardSize - 8);
    }
    y = skinStartY + cardSize + gap;
    window._skinBtns = Array.from({length:3}, (_,i) => ({
      x: cardStartX + i * (cardSize + cardGap), y: skinStartY, w: cardSize, h: cardSize
    }));

    // Skin joke — big, fills remaining space between cards and button
    ctx.fillStyle = '#ffa726';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    const sjLines = drawWrappedText(skinJoke, cx, y + 22, textW, 28);

    // Start button — pinned to bottom
    ctx.fillStyle = '#00e676';
    ctx.beginPath(); ctx.roundRect(cx - btnW / 2, startBtnY, btnW, btnH, 14); ctx.fill();
    ctx.fillStyle = '#0a1628';
    ctx.font = 'bold 26px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('СТАРТ', cx, startBtnY + btnH * 0.65);

    // Hint — pinned below button
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '12px monospace';
    ctx.fillText('Тап — прыгать  |  Двойной тап — пауза', cx, hintY);
    ctx.textAlign = 'left';

    // Hub button (top-left)
    const hubBtnW = P ? 100 : 90, hubBtnH = P ? 36 : 30;
    const hubBtnX = 10, hubBtnY2 = 10;
    ctx.fillStyle = '#546e7a';
    ctx.beginPath(); ctx.roundRect(hubBtnX, hubBtnY2, hubBtnW, hubBtnH, 8); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${P ? 16 : 13}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('← ХАБ', hubBtnX + hubBtnW / 2, hubBtnY2 + hubBtnH * 0.65);
    ctx.textAlign = 'left';

    window._menuBtns = {
      skins: window._skinBtns,
      start: { x: cx - btnW / 2, y: startBtnY, w: btnW, h: btnH },
      hub: { x: hubBtnX, y: hubBtnY2, w: hubBtnW, h: hubBtnH }
    };

  } else {
    // ===== DESKTOP: original horizontal layout =====
    const totalContentH = 420;
    const offsetY = Math.max(10, (CANVAS_H - totalContentH) / 2);

    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    const titlePadD = 20;
    const maxTitleWD = CANVAS_W - titlePadD * 2;
    let titleFontSizeD = 40;
    ctx.font = `bold ${titleFontSizeD}px monospace`;
    while (ctx.measureText('FLAPPY САНЯ').width > maxTitleWD && titleFontSizeD > 16) {
      titleFontSizeD -= 2;
      ctx.font = `bold ${titleFontSizeD}px monospace`;
    }
    ctx.fillText('FLAPPY САНЯ', cx, offsetY + 45);

    ctx.font = '15px monospace';
    ctx.fillStyle = '#a0c4ff';
    ctx.fillText('Пролети через курс доллара!', cx, offsetY + 72);

    ctx.fillStyle = '#ffa726';
    ctx.font = '12px monospace';
    const jokeStart = offsetY + 95;
    const jLines = drawWrappedText(menuJoke, cx, jokeStart, CANVAS_W * 0.92, 16);
    let nextY = jokeStart + jLines * 16 + 6;

    if (highScore > 0) {
      ctx.fillStyle = '#ffd700';
      ctx.font = '13px monospace';
      ctx.fillText(`Рекорд: ${highScore} нед.`, cx, nextY + 6);
      nextY += 18;
    }

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('Выберите лук:', cx, nextY + 20);
    const skinStartY = nextY + 32;

    const bw = 140, bh = 110, gap = 20;
    const totalW = bw * 3 + gap * 2;
    for (let i = 0; i < 3; i++) {
      const bx = cx - totalW / 2 + i * (bw + gap);
      const by = skinStartY;

      ctx.fillStyle = selectedSkin === i ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.07)';
      ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10); ctx.fill();
      ctx.strokeStyle = selectedSkin === i ? skinColors[i] : 'rgba(255,255,255,0.2)';
      ctx.lineWidth = selectedSkin === i ? 3 : 1;
      ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 10); ctx.stroke();

      ctx.save();
      if (i === 0) drawRocket(bx + bw / 2, by + bh * 0.42, 0.9);
      else if (i === 1) drawCar(bx + bw / 2, by + bh * 0.42, 0.85);
      else drawWalking(bx + bw / 2, by + bh * 0.32, 0.72);
      ctx.restore();

      ctx.fillStyle = selectedSkin === i ? skinColors[i] : '#888';
      ctx.font = 'bold 13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(skins[i], bx + bw / 2, by + bh - 8);
    }
    const skinEndY = skinStartY + bh;
    window._skinBtns = Array.from({length:3}, (_,i) => ({
      x: cx - totalW / 2 + i * (bw + gap), y: skinStartY, w: bw, h: bh
    }));

    ctx.fillStyle = 'rgba(255,200,100,0.7)';
    ctx.font = '10px monospace';
    const sjY = skinEndY + 14;
    const sjLines = drawWrappedText(skinJoke, cx, sjY, CANVAS_W * 0.9, 13);

    const btnY = sjY + sjLines * 13 + 10;
    const btnW = 200, btnH = 48;
    ctx.fillStyle = '#00e676';
    ctx.beginPath(); ctx.roundRect(cx - btnW / 2, btnY, btnW, btnH, 10); ctx.fill();
    ctx.fillStyle = '#0a1628';
    ctx.font = 'bold 20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('СТАРТ', cx, btnY + btnH * 0.65);

    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '11px monospace';
    ctx.fillText('↑ / Пробел / Тап — прыгать  |  ESC — пауза', cx, btnY + btnH + 22);
    ctx.textAlign = 'left';

    // Hub button (top-left)
    const hubBtnW = 90, hubBtnH = 30;
    const hubBtnX = 10, hubBtnY2 = 10;
    ctx.fillStyle = '#546e7a';
    ctx.beginPath(); ctx.roundRect(hubBtnX, hubBtnY2, hubBtnW, hubBtnH, 8); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('← ХАБ', hubBtnX + hubBtnW / 2, hubBtnY2 + hubBtnH * 0.65);
    ctx.textAlign = 'left';

    window._menuBtns = {
      skins: window._skinBtns,
      start: { x: cx - btnW / 2, y: btnY, w: btnW, h: btnH },
      hub: { x: hubBtnX, y: hubBtnY2, w: hubBtnW, h: hubBtnH }
    };
  }
}

// ============ PAUSE ============
function drawPauseMenu() {
  const P = IS_PORTRAIT;
  const cx = CANVAS_W / 2;
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${P ? 42 : 32}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('ПАУЗА', cx, CANVAS_H * (P ? 0.22 : 0.2));

  const btnW = P ? CANVAS_W * 0.7 : 240;
  const btnH = P ? 50 : 42;
  const btnGap = P ? 14 : 11;
  const totalBtnsH = btnH * 4 + btnGap * 3;
  const btnY1 = CANVAS_H * (P ? 0.3 : 0.28);
  const btnY2 = btnY1 + btnH + btnGap;
  const btnY3 = btnY2 + btnH + btnGap;
  const btnY4 = btnY3 + btnH + btnGap;

  // ПРОДОЛЖИТЬ
  ctx.fillStyle = '#00e676';
  ctx.beginPath(); ctx.roundRect(cx - btnW / 2, btnY1, btnW, btnH, 10); ctx.fill();
  ctx.fillStyle = '#0a1628';
  ctx.font = `bold ${P ? 20 : 16}px monospace`;
  ctx.fillText('ПРОДОЛЖИТЬ', cx, btnY1 + btnH * 0.63);

  // МЕНЮ ИГРЫ
  ctx.fillStyle = '#ff5722';
  ctx.beginPath(); ctx.roundRect(cx - btnW / 2, btnY2, btnW, btnH, 10); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${P ? 18 : 15}px monospace`;
  ctx.fillText('МЕНЮ ИГРЫ', cx, btnY2 + btnH * 0.63);

  // ХАБ
  ctx.fillStyle = '#546e7a';
  ctx.beginPath(); ctx.roundRect(cx - btnW / 2, btnY3, btnW, btnH, 10); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${P ? 18 : 15}px monospace`;
  ctx.fillText('ХАБ', cx, btnY3 + btnH * 0.63);

  // ПРОФИЛЬ
  ctx.fillStyle = '#546e7a';
  ctx.beginPath(); ctx.roundRect(cx - btnW / 2, btnY4, btnW, btnH, 10); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${P ? 18 : 15}px monospace`;
  ctx.fillText('ПРОФИЛЬ', cx, btnY4 + btnH * 0.63);

  ctx.textAlign = 'left';

  window._pauseBtns = {
    cont: { x: cx - btnW / 2, y: btnY1, w: btnW, h: btnH },
    exit: { x: cx - btnW / 2, y: btnY2, w: btnW, h: btnH },
    hub: { x: cx - btnW / 2, y: btnY3, w: btnW, h: btnH },
    profile: { x: cx - btnW / 2, y: btnY4, w: btnW, h: btnH }
  };
}

// ============ GAME OVER ============
function drawGameOver() {
  const P = IS_PORTRAIT;
  const cx = CANVAS_W / 2;
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.textAlign = 'center';

  const pad = CANVAS_W * 0.08;
  const textW = CANVAS_W - pad * 2;

  if (P) {
    // Portrait game over — fill screen, buttons at bottom
    const btnH = 52, btnW = CANVAS_W * 0.65, bottomPad = 20;
    const btnY2 = CANVAS_H - bottomPad - btnH;
    const btnY1 = btnY2 - btnH - 14;
    const contentBottom = btnY1 - 20;

    let y = CANVAS_H * 0.08;

    ctx.fillStyle = '#ff1744';
    ctx.font = 'bold 48px monospace';
    ctx.fillText('КРАХ!', cx, y + 48);
    y += 70;

    ctx.fillStyle = '#fff';
    ctx.font = '24px monospace';
    ctx.fillText(`Вы продержались ${score} нед.`, cx, y + 24);
    y += 40;

    const day = score + START_WEEK;
    ensureRateData(day);
    if (day > 0) {
      ctx.fillStyle = '#a0c4ff';
      ctx.font = '16px monospace';
      const rateText = `Курс: ${RATE_DATA[day].rate.toFixed(2)}₽ (${RATE_DATA[day].date})`;
      ctx.fillText(rateText, cx, y + 16);
      y += 30;
    }

    y += 10;
    ctx.fillStyle = '#ffa726';
    ctx.font = 'bold 18px monospace';
    const jLines = drawWrappedText(currentJoke, cx, y + 18, textW, 26);
    y += jLines * 26 + 14;

    ctx.fillStyle = '#81d4fa';
    ctx.font = '15px monospace';
    const sqLines = drawWrappedText(currentSanyaQuip, cx, y + 15, textW, 20);
    y += sqLines * 20 + 20;

    if (score >= highScore && score > 0) {
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 26px monospace';
      ctx.fillText('НОВЫЙ РЕКОРД!', cx, y + 26);
    } else if (highScore > 0) {
      ctx.fillStyle = '#ffd700';
      ctx.font = '18px monospace';
      ctx.fillText(`Рекорд: ${highScore} нед.`, cx, y + 18);
    }

    // Buttons pinned to bottom
    const btnY3 = btnY2 - btnH - 14;
    const btnY1adj = btnY3 - btnH - 14;

    ctx.fillStyle = '#00e676';
    ctx.beginPath(); ctx.roundRect(cx - btnW / 2, btnY1adj, btnW, btnH, 10); ctx.fill();
    ctx.fillStyle = '#0a1628';
    ctx.font = 'bold 22px monospace';
    ctx.fillText('ЗАНОВО', cx, btnY1adj + btnH * 0.65);

    ctx.fillStyle = '#546e7a';
    ctx.beginPath(); ctx.roundRect(cx - btnW / 2, btnY3, btnW, btnH, 10); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '16px monospace';
    ctx.fillText('ВЫБОР ПЕРСОНАЖА', cx, btnY3 + btnH * 0.62);

    ctx.fillStyle = '#546e7a';
    ctx.beginPath(); ctx.roundRect(cx - btnW / 2, btnY2, btnW, btnH, 10); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '16px monospace';
    ctx.fillText('ХАБ', cx, btnY2 + btnH * 0.62);
    ctx.textAlign = 'left';

    window._goBtns = {
      retry: { x: cx - btnW / 2, y: btnY1adj, w: btnW, h: btnH },
      menu: { x: cx - btnW / 2, y: btnY3, w: btnW, h: btnH },
      hub: { x: cx - btnW / 2, y: btnY2, w: btnW, h: btnH }
    };
  } else {
    // Desktop game over
    ctx.fillStyle = '#ff1744';
    ctx.font = 'bold 36px monospace';
    ctx.fillText('КРАХ!', cx, CANVAS_H * 0.16);

    ctx.fillStyle = '#fff';
    ctx.font = '20px monospace';
    ctx.fillText(`Вы продержались ${score} нед.`, cx, CANVAS_H * 0.25);

    const day = score + START_WEEK;
    ensureRateData(day);
    if (day > 0) {
      ctx.fillStyle = '#a0c4ff';
      ctx.font = '13px monospace';
      ctx.fillText(`Врезался при курсе ${RATE_DATA[day].rate.toFixed(2)}₽ (${RATE_DATA[day].date})`, cx, CANVAS_H * 0.32);
    }

    ctx.fillStyle = '#ffa726';
    ctx.font = '12px monospace';
    const jY = CANVAS_H * 0.39;
    const jLines = drawWrappedText(currentJoke, cx, jY, CANVAS_W * 0.85, 16);

    const sqY = jY + jLines * 16 + 10;
    ctx.fillStyle = '#81d4fa';
    ctx.font = '11px monospace';
    const sqLinesD = drawWrappedText(currentSanyaQuip, cx, sqY, CANVAS_W * 0.85, 14);

    const afterSq = sqY + sqLinesD * 14 + 12;
    if (score >= highScore && score > 0) {
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 18px monospace';
      ctx.fillText('НОВЫЙ РЕКОРД!', cx, afterSq);
    } else if (highScore > 0) {
      ctx.fillStyle = '#ffd700';
      ctx.font = '13px monospace';
      ctx.fillText(`Рекорд: ${highScore} нед.`, cx, afterSq);
    }

    const btnW = 200, btnH = 45;
    const btnY1 = CANVAS_H * 0.63, btnY2 = btnY1 + btnH + 10, btnY3 = btnY2 + btnH + 10;

    ctx.fillStyle = '#00e676';
    ctx.beginPath(); ctx.roundRect(cx - btnW / 2, btnY1, btnW, btnH, 8); ctx.fill();
    ctx.fillStyle = '#0a1628';
    ctx.font = 'bold 16px monospace';
    ctx.fillText('ЗАНОВО', cx, btnY1 + 30);

    ctx.fillStyle = '#546e7a';
    ctx.beginPath(); ctx.roundRect(cx - btnW / 2, btnY2, btnW, btnH, 8); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '14px monospace';
    ctx.fillText('ВЫБОР ПЕРСОНАЖА', cx, btnY2 + 28);

    ctx.fillStyle = '#546e7a';
    ctx.beginPath(); ctx.roundRect(cx - btnW / 2, btnY3, btnW, btnH, 8); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '14px monospace';
    ctx.fillText('ХАБ', cx, btnY3 + 28);
    ctx.textAlign = 'left';

    window._goBtns = {
      retry: { x: cx - btnW / 2, y: btnY1, w: btnW, h: btnH },
      menu: { x: cx - btnW / 2, y: btnY2, w: btnW, h: btnH },
      hub: { x: cx - btnW / 2, y: btnY3, w: btnW, h: btnH }
    };
  }
}

// ============ GAME LOGIC ============
function endGame() {
  if (score > highScore) {
    highScore = score;
    // highScore lives in memory only — resets on page reload
  }
  const day = getCurrentDay();
  ensureRateData(day);
  currentJoke = getRandomJoke(JOKES_END, score, RATE_DATA[day].rate);
  currentSanyaQuip = SANYA_QUIPS[Math.floor(Math.random() * SANYA_QUIPS.length)];
  if (window.GameHub) GameHub.submitScore('flappy-sanya', score);
  state = 'gameover';
}

const START_WEEK = 75; // Start at week 75 (~101₽, Aug 2023) — after initial spike/crash

function startGame() {
  state = 'playing';
  scrollX = START_WEEK * DAY_WIDTH;
  playerY = rateToY(RATE_DATA[START_WEEK].rate);
  playerVY = 0;
  score = 0;
}

function update() {
  if (state !== 'playing') return;
  playerVY += GRAVITY;
  playerY += playerVY;
  const weeksPlayed = Math.floor((scrollX / DAY_WIDTH) - START_WEEK);
  const speedBoosts = Math.floor(Math.max(0, weeksPlayed) / 20);
  scrollX += SCROLL_SPEED * (1 + speedBoosts * 0.1);
  score = getCurrentDay() - START_WEEK;

  // Ensure procedural data exists ahead of the player
  ensureRateData(getCurrentDay() + 20);
  if (checkCollision()) {
    endGame();
  }
}

function draw() {
  drawBackground();
  drawCeiling();
  drawGround();
  drawPlayer(PLAYER_X, playerY);
  drawHUD();
  if (state === 'paused') drawPauseMenu();
  if (state === 'gameover') drawGameOver();
}

function gameLoop() {
  if (state === 'menu') drawMenu();
  else { update(); draw(); }
  requestAnimationFrame(gameLoop);
}

// ============ INPUT ============
function jump() { if (state === 'playing') playerVY = JUMP_FORCE; }

function hitTest(mx, my, b) {
  return mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h;
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowUp' || e.code === 'Space') {
    e.preventDefault();
    if (state === 'menu') startGame();
    else if (state === 'gameover') startGame();
    else jump();
  }
  if (e.code === 'Escape') {
    if (state === 'playing') state = 'paused';
    else if (state === 'paused') state = 'playing';
  }
});

function handleClick(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const mx = (clientX - rect.left) * (CANVAS_W / rect.width);
  const my = (clientY - rect.top) * (CANVAS_H / rect.height);

  if (state === 'menu' && window._menuBtns) {
    for (let i = 0; i < 3; i++) {
      if (hitTest(mx, my, window._menuBtns.skins[i])) {
        selectedSkin = i;
        skinJoke = getRandomJoke(JOKES_SKIN[i], 0, 0);
        return;
      }
    }
    if (hitTest(mx, my, window._menuBtns.start)) { startGame(); return; }
    if (window._menuBtns.hub && hitTest(mx, my, window._menuBtns.hub)) { goToHub(); return; }
  }
  if (state === 'playing') {
    if (window._pauseBtn && hitTest(mx, my, window._pauseBtn)) { state = 'paused'; return; }
    jump(); return;
  }
  if (state === 'paused' && window._pauseBtns) {
    if (hitTest(mx, my, window._pauseBtns.cont)) { state = 'playing'; return; }
    if (hitTest(mx, my, window._pauseBtns.exit)) { menuJoke = getRandomJoke(JOKES_START,0,0); skinJoke = getRandomJoke(JOKES_SKIN[selectedSkin],0,0); state = 'menu'; return; }
    if (hitTest(mx, my, window._pauseBtns.hub)) { goToHub(); return; }
    if (hitTest(mx, my, window._pauseBtns.profile)) { goToProfile(); return; }
  }
  if (state === 'gameover' && window._goBtns) {
    if (hitTest(mx, my, window._goBtns.retry)) { startGame(); return; }
    if (hitTest(mx, my, window._goBtns.menu)) { menuJoke = getRandomJoke(JOKES_START,0,0); skinJoke = getRandomJoke(JOKES_SKIN[selectedSkin],0,0); state = 'menu'; return; }
    if (window._goBtns.hub && hitTest(mx, my, window._goBtns.hub)) { goToHub(); return; }
  }
}

canvas.addEventListener('click', (e) => { e.preventDefault(); handleClick(e.clientX, e.clientY); });
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (e.touches.length > 0) handleClick(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
canvas.addEventListener('dblclick', (e) => {
  e.preventDefault();
  if (state === 'playing') state = 'paused';
  else if (state === 'paused') state = 'playing';
});

// ============ START ============
gameLoop();
</script>
