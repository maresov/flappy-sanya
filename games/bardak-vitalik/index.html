<!DOCTYPE html>
<!-- Unlike flappy-sanya and goose-dima (canvas-only), this game uses HTML overlays
     for menus/pause/gameover (.overlay divs) and canvas only for live gameplay.
     showScreen(id) toggles between them. -->
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Бардак Виталика</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a1628;font-family:monospace;color:#e0e0e0;touch-action:none;user-select:none;-webkit-user-select:none}
canvas{display:block;width:100%;height:100%}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-evenly;z-index:10;background:rgba(0,0,0,0.85);padding:max(24px,env(safe-area-inset-top)) 20px max(20px,env(safe-area-inset-bottom)) 20px;overflow-y:auto}
.overlay.hidden{display:none}
.title{font-size:clamp(24px,6vw,48px);font-weight:bold;color:#00e676;text-align:center;margin-bottom:8px}
.subtitle{font-size:clamp(20px,3.5vw,22px);color:#a0c4ff;text-align:center;max-width:calc(100% - 40px);margin-bottom:20px;line-height:1.4}
.btn{display:block;width:min(280px,80vw);min-height:52px;padding:14px 20px;margin:6px auto;border:none;border-radius:12px;font-family:monospace;font-size:clamp(20px,3.5vw,24px);font-weight:bold;cursor:pointer;text-align:center;transition:transform .1s}
.btn:active{transform:scale(0.95)}
.btn-green{background:#00e676;color:#0a1628}
.btn-gray{background:#546e7a;color:#ccc}
.btn-red{background:#ff1744;color:#fff}
.score-display{font-size:clamp(20px,4vw,28px);color:#00e676;margin:8px 0}
.joke-text{font-size:clamp(20px,3.5vw,22px);color:#ffa726;text-align:center;max-width:85%;margin:10px auto;line-height:1.4;white-space:pre-line}
.go-title{font-size:clamp(28px,7vw,56px);font-weight:bold;color:#ff1744;margin-bottom:4px}
.go-sub{font-size:clamp(20px,3vw,22px);color:#fff;margin-bottom:8px}
.highscore{font-size:clamp(20px,3vw,22px);color:#ffd700;margin-bottom:10px}
.pause-buttons{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:12px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- Start Screen -->
<div class="overlay" id="startScreen">
  <div class="title">Бардак Виталика</div>
  <div class="subtitle" style="white-space:pre-line">Лови падающую посуду — тапай по ней!
Не дай ей разбиться и заполнить стол.</div>
  <div style="color:#fff;font-weight:bold;font-size:clamp(20px,3.5vw,24px);margin:8px 0 4px">Выберите лук:</div>
  <div id="skinCards" style="display:flex;gap:12px;justify-content:center;margin-bottom:6px"></div>
  <div id="skinJoke" style="color:#ffa726;font-size:clamp(20px,3.5vw,22px);text-align:center;max-width:85%;margin:12px auto 20px;line-height:1.3;min-height:40px"></div>
  <div class="highscore" id="startHigh">Рекорд: 0</div>
  <div style="display:flex;flex-direction:column;align-items:center">
    <button class="btn btn-green" onclick="startGame()">ИГРАТЬ</button>
    <button class="btn btn-gray" onclick="goHub()">← ХАБ</button>
  </div>
</div>

<!-- Pause Overlay -->
<div class="overlay hidden" id="pauseScreen">
  <div class="title" style="font-size:clamp(24px,5vw,36px)">ПАУЗА</div>
  <div class="pause-buttons">
    <button class="btn btn-green" onclick="resumeGame()">ПРОДОЛЖИТЬ</button>
    <button class="btn btn-gray" onclick="goMenu()">МЕНЮ ИГРЫ</button>
    <button class="btn btn-gray" onclick="goHub()">← ХАБ</button>
  </div>
</div>

<!-- Game Over -->
<div class="overlay hidden" id="gameOverScreen">
  <div class="go-title" style="text-align:center">ПОСУДОМОЙКА ПОЛНАЯ!</div>
  <div class="go-sub" style="text-align:center;max-width:calc(100% - 40px);margin:8px auto">Виталик проиграл — посуда всё-таки попала в посудомойку!</div>
  <div class="joke-text" id="goJoke"></div>
  <div class="score-display" id="goScore">0</div>
  <div class="highscore" id="goHigh">Рекорд: 0</div>
  <div style="display:flex;flex-direction:column;align-items:center">
    <button class="btn btn-green" onclick="startGame()">ЗАНОВО</button>
    <button class="btn btn-gray" onclick="goHub()">← ХАБ</button>
  </div>
</div>

<!-- Wave overlay removed for clarity -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../../shared/supabase-config.js"></script>
<script src="../../shared/hub-sdk.js"></script>
<script src="../../shared/polyfills.js"></script>
<script>
// ===== SKINS =====
const VITALIK_SKINS = ['Со шваброй', 'С кальяном', 'Спит'];
const SKIN_COLORS = ['#00e676', '#ffa726', '#ffd700'];
const SKIN_JOKES = [
  [
    "Виталик взял швабру!\nНо только чтобы отмахиваться от посуды",
    "Швабра в руках Виталика —\nскорее оружие, чем инструмент",
    "Виталик: «Швабра — это для\nсамообороны, а не для уборки»",
    "Виталик машет шваброй.\nПосуда в ужасе разлетается",
    "Швабра +10 к харизме,\n-10 к уборке",
    "Виталик: «Швабра — мой меч.\nБардак — мой дракон»",
    "Виталик со шваброй опаснее,\nчем бардак после вечеринки",
    "Швабра уже сухая 3 месяца.\nВиталик доволен",
    "Виталик: «Шваброй можно\nи мух гонять, и посуду ловить»",
    "Виталик взял швабру для вида.\nПол мыть не планирует",
    "Швабра в руках Виталика —\nчисто декоративный элемент",
    "Виталик: «Я не ленивый,\nя стратегически отдыхаю»"
  ],
  [
    "Виталик закурил кальян\nпрямо на кухне!",
    "Виталик: «Сначала покурю,\nпотом уберу... наверное»",
    "Дым от кальяна не скроет\nбардак, Виталик!",
    "Кальян готов, посуда нет.\nПриоритеты расставлены",
    "Виталик: «Кальян помогает\nдумать... о чём-нибудь»",
    "Виталик дымит как паровоз.\nПосуда плачет в раковине",
    "Виталик: «Один кальян —\nи я точно начну убирать»",
    "Кальян заряжен, мотивация нет",
    "Виталик курит и медитирует\nнад горой посуды",
    "Виталик: «Кальян — это\nмоя посудомоечная машина»",
    "Между кальяном и уборкой\nВиталик всегда выбирает кальян",
    "Виталик: «Дым рассеется.\nА посуда... тоже рассеется?»"
  ],
  [
    "Виталик уснул прямо за столом!",
    "Виталик: *храп*\n...посуда подождёт...",
    "Сонный Виталик ловит\nпосуду на автопилоте",
    "Виталик спит, а бардак\nне спит никогда",
    "Виталик: *бормочет во сне*\n«Посуда... потом...»",
    "Храп Виталика громче,\nчем падающие тарелки",
    "Виталик видит сон:\nчистая кухня. Только сон",
    "Виталик: Zzz... «Мама,\nя уже помыл...» ...Zzz",
    "Уснул стоя.\nНастоящий талант",
    "Виталик спит крепче,\nчем засохшая еда на сковородке",
    "Во сне Виталик убирается.\nВ реальности — нет",
    "Подушка > посуда.\nЖизненное кредо Виталика"
  ]
];
let selectedSkin = 0;
let skinJoke = SKIN_JOKES[0][0];

function drawVitalik(cvs, skin) {
  var c = cvs.getContext('2d');
  var w = cvs.width, h = cvs.height;
  c.clearRect(0, 0, w, h);
  var cx = w / 2, cy = h / 2 + 4;
  var r = 16;

  // Body (hoodie color per skin)
  var hoodieColors = ['#78909c', '#e65100', '#6a1b9a'];
  c.fillStyle = hoodieColors[skin] || '#78909c';
  c.beginPath();
  c.ellipse(cx, cy + 8, 14, 16, 0, 0, Math.PI * 2);
  c.fill();

  // Legs
  c.strokeStyle = '#37474f';
  c.lineWidth = 3;
  c.beginPath();
  c.moveTo(cx - 5, cy + 22);
  c.lineTo(cx - 6, cy + 32);
  c.moveTo(cx + 5, cy + 22);
  c.lineTo(cx + 6, cy + 32);
  c.stroke();

  // Head
  c.fillStyle = '#ffcc99';
  c.beginPath();
  c.arc(cx, cy - 8, r * 0.7, 0, Math.PI * 2);
  c.fill();

  // Hair (messy)
  c.fillStyle = '#5d4037';
  c.beginPath();
  c.ellipse(cx, cy - 16, 10, 5, 0, Math.PI, Math.PI * 2);
  c.fill();
  c.beginPath();
  c.ellipse(cx - 6, cy - 14, 4, 3, -0.3, Math.PI, Math.PI * 2);
  c.fill();

  if (skin === 2) {
    // Sleeping: closed eyes (lines), Zzz
    c.strokeStyle = '#333';
    c.lineWidth = 1.5;
    c.beginPath();
    c.moveTo(cx - 6, cy - 8);
    c.lineTo(cx - 2, cy - 8);
    c.moveTo(cx + 2, cy - 8);
    c.lineTo(cx + 6, cy - 8);
    c.stroke();
    // Zzz
    c.fillStyle = '#ffd700';
    c.font = 'bold 10px monospace';
    c.fillText('Z', cx + 12, cy - 14);
    c.font = 'bold 8px monospace';
    c.fillText('z', cx + 16, cy - 20);
    c.font = 'bold 6px monospace';
    c.fillText('z', cx + 19, cy - 24);
    // Arms down (relaxed)
    c.strokeStyle = '#ffcc99';
    c.lineWidth = 2.5;
    c.beginPath();
    c.moveTo(cx - 12, cy + 2);
    c.lineTo(cx - 18, cy + 18);
    c.moveTo(cx + 12, cy + 2);
    c.lineTo(cx + 18, cy + 18);
    c.stroke();
  } else {
    // Awake eyes
    c.fillStyle = '#fff';
    c.beginPath();
    c.arc(cx - 4, cy - 9, 3.5, 0, Math.PI * 2);
    c.fill();
    c.beginPath();
    c.arc(cx + 4, cy - 9, 3.5, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#333';
    c.beginPath();
    c.arc(cx - 4, cy - 9, 1.5, 0, Math.PI * 2);
    c.fill();
    c.beginPath();
    c.arc(cx + 4, cy - 9, 1.5, 0, Math.PI * 2);
    c.fill();

    if (skin === 0) {
      // Mop: held in right hand
      c.strokeStyle = '#8d6e63';
      c.lineWidth = 2.5;
      c.beginPath();
      c.moveTo(cx + 14, cy - 4);
      c.lineTo(cx + 22, cy + 30);
      c.stroke();
      // Mop head
      c.fillStyle = '#bdbdbd';
      c.fillRect(cx + 17, cy + 28, 12, 6);
      c.strokeStyle = '#999';
      c.lineWidth = 1;
      for (var mi = 0; mi < 4; mi++) {
        c.beginPath();
        c.moveTo(cx + 18 + mi * 3, cy + 34);
        c.lineTo(cx + 18 + mi * 3, cy + 40);
        c.stroke();
      }
      // Left arm relaxed
      c.strokeStyle = '#ffcc99';
      c.lineWidth = 2.5;
      c.beginPath();
      c.moveTo(cx - 12, cy + 2);
      c.lineTo(cx - 18, cy + 16);
      c.stroke();
      // Right arm holding mop
      c.beginPath();
      c.moveTo(cx + 12, cy + 2);
      c.lineTo(cx + 14, cy - 4);
      c.stroke();
    } else if (skin === 1) {
      // Hookah: left hand holds hose
      // Hookah base
      c.fillStyle = '#c62828';
      c.beginPath();
      c.ellipse(cx - 20, cy + 26, 6, 8, 0, 0, Math.PI * 2);
      c.fill();
      c.fillStyle = '#b71c1c';
      c.fillRect(cx - 22, cy + 18, 4, 10);
      // Bowl on top
      c.fillStyle = '#ff8f00';
      c.beginPath();
      c.arc(cx - 20, cy + 16, 4, 0, Math.PI * 2);
      c.fill();
      // Hose
      c.strokeStyle = '#666';
      c.lineWidth = 2;
      c.beginPath();
      c.moveTo(cx - 16, cy + 22);
      c.quadraticCurveTo(cx - 6, cy + 14, cx - 14, cy + 2);
      c.stroke();
      // Smoke puffs
      c.fillStyle = 'rgba(200,200,200,0.4)';
      c.beginPath(); c.arc(cx - 10, cy - 16, 5, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(cx - 14, cy - 22, 4, 0, Math.PI * 2); c.fill();
      c.beginPath(); c.arc(cx - 8, cy - 26, 3, 0, Math.PI * 2); c.fill();
      // Arms
      c.strokeStyle = '#ffcc99';
      c.lineWidth = 2.5;
      c.beginPath();
      c.moveTo(cx - 12, cy + 2);
      c.lineTo(cx - 14, cy + 2);
      c.stroke();
      c.beginPath();
      c.moveTo(cx + 12, cy + 2);
      c.lineTo(cx + 18, cy + 16);
      c.stroke();
    }
  }
}

function renderSkinCards() {
  var container = document.getElementById('skinCards');
  container.innerHTML = '';
  for (var i = 0; i < VITALIK_SKINS.length; i++) {
    var card = document.createElement('div');
    card.style.cssText = 'width:76px;height:76px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;' +
      (i === selectedSkin ? 'background:rgba(255,255,255,0.15);border:3px solid ' + SKIN_COLORS[i] : 'background:rgba(255,255,255,0.05);border:1px solid #555');
    var cvs = document.createElement('canvas');
    cvs.width = 64; cvs.height = 64;
    cvs.style.cssText = 'width:64px;height:64px';
    drawVitalik(cvs, i);
    card.appendChild(cvs);
    card.dataset.idx = i;
    card.addEventListener('click', function() {
      selectedSkin = parseInt(this.dataset.idx);
      var jokes = SKIN_JOKES[selectedSkin];
      skinJoke = jokes[Math.floor(Math.random() * jokes.length)];
      renderSkinCards();
      document.getElementById('skinJoke').textContent = skinJoke;
    });
    container.appendChild(card);
  }
  document.getElementById('skinJoke').textContent = skinJoke;
}

// ===== CONSTANTS =====
const TABLE_MAX = 5;
const FREEZE_DURATION = 5000;
const BONUS_INTERVAL_MIN = 12000;
const BONUS_INTERVAL_MAX = 22000;

const GO_JOKES = [
  'Виталик: «Нет! Только не посудомойка!»',
  'Посуда попала в посудомойку.\nВиталик в шоке',
  'Виталик проиграл битву с чистотой',
  'Друзья тайком загрузили посудомойку',
  'Виталик: «Руками мыть —\nэто традиция!»',
  'Посудомойка: 1, Виталик: 0',
  'Виталик: «Я же говорил —\nона сама загрузится»',
  'Виталик ушёл думать о покупке квартиры.\nПосудомойка осталась полной',
  'Виталик ушёл на перекур.\nПосуда осталась грязной',
  'Виталик копил на квартиру.\nНо купил только сигареты',
  'Виталик: «Это знак! Пойду покурю»',
  'Виталик так долго выбирал квартиру,\nчто посуда сама загрузилась',
  'Вечеринка закончилась.\nБардак — нет',
  'Виталик: «Я не проиграл.\nЯ стратегически отступил»',
  'Кальян потух. Мотивация тоже',
  'Виталик уснул.\nПосуда победила',
  'Виталик: «Это всё друзья!\nОни принесли еду!»',
  'Швабра сломалась.\nВиталик рад',
  'Виталик: «Ладно, вызову\nклининг... завтра»',
  'Друзья устроили вечеринку.\nА убирать — Виталику',
  'Виталик: «Может, если не смотреть,\nоно само исчезнет?»',
  'Посуда: 999, Виталик: 0.\nЭпичное поражение',
];

// Dish types: name, color, width (relative), height (relative), slots, speed multiplier, points, rarity weight
const DISH_TYPES = [
  { name: 'plate',  color: '#e0e0e0', wRatio: 0.18, hRatio: 0.05,  shape: 'ellipse', slots: 1, speedMul: 0.7,  points: 1, weight: 40 },
  { name: 'cup',    color: '#90caf9', wRatio: 0.12, hRatio: 0.09,  shape: 'rect',    slots: 1, speedMul: 1.0,  points: 1, weight: 35 },
  { name: 'pan',    color: '#616161', wRatio: 0.28, hRatio: 0.07,  shape: 'rect',    slots: 2, speedMul: 1.3,  points: 2, weight: 18 },
  { name: 'pot',    color: '#8d6e63', wRatio: 0.24, hRatio: 0.14,  shape: 'rect',    slots: 3, speedMul: 0.6,  points: 3, weight: 7  }
];

// ===== GLOBALS =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;
let state = 'start'; // start, playing, paused, gameover
let score = 0, highScore = 0, _lastAutoSave = 0, tablePile = 0;
let dishes = [], bonuses = [], particles = [], tableDishes = [];
let baseSpeed = 1.5, spawnInterval = 1800, spawnTimer = 0;
let freezeEnd = 0, nextBonusTime = 0;
let lastTime = 0, gameTime = 0;
let gameElapsed = 0, speedMultiplier = 1, lastSpeedTick = 0;
let animId = null;

// ===== RESIZE =====
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ===== HELPERS =====
function rand(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b) { return Math.floor(rand(a, b + 1)); }
function pick(arr) { return arr[randInt(0, arr.length - 1)]; }

function weightedPick(types) {
  let total = types.reduce((s, t) => s + t.weight, 0);
  let r = Math.random() * total;
  for (let t of types) { r -= t.weight; if (r <= 0) return t; }
  return types[0];
}

function loadHigh() {
  highScore = 0;
  if (window.GameHub && GameHub.getMyBestScoreAsync) {
    GameHub.getMyBestScoreAsync('bardak-vitalik').then(function(s) {
      if (s && s > highScore) highScore = s;
    });
  }
}

function saveHigh() {
  if (window.GameHub) window.GameHub.submitScore('bardak-vitalik', score);
}

function showScreen(id) {
  ['startScreen','pauseScreen','gameOverScreen'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

function goHub() { if (window.GameHub) window.GameHub.backToHub(); else window.location.href = '../../'; }
function goMenu() { state = 'start'; showStart(); }

// ===== SCREENS =====
function showStart() {
  loadHigh();
  document.getElementById('startHigh').textContent = 'Рекорд: ' + highScore;
  renderSkinCards();
  showScreen('startScreen');
  state = 'start';
  if (animId) { cancelAnimationFrame(animId); animId = null; }
}

function showGameOver() {
  if (score > highScore) highScore = score;
  saveHigh();
  document.getElementById('goScore').textContent = 'Счёт: ' + score;
  document.getElementById('goHigh').textContent = 'Рекорд: ' + highScore;
  document.getElementById('goJoke').textContent = pick(GO_JOKES);
  showScreen('gameOverScreen');
  state = 'gameover';
}

// ===== GAME INIT =====
function startGame() {
  score = 0; tablePile = 0; gameTime = 0; _lastAutoSave = 0;
  dishes = []; bonuses = []; particles = []; tableDishes = [];
  baseSpeed = 1.5; spawnInterval = 1800; spawnTimer = 0;
  freezeEnd = 0;
  gameElapsed = 0; speedMultiplier = 1; lastSpeedTick = 0;
  nextBonusTime = performance.now() + rand(BONUS_INTERVAL_MIN, BONUS_INTERVAL_MAX);
  lastTime = 0;
  state = 'playing';
  showScreen(null);
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

function pauseGame() {
  if (state !== 'playing') return;
  state = 'paused';
  showScreen('pauseScreen');
}

function resumeGame() {
  if (state !== 'paused') return;
  state = 'playing';
  lastTime = 0;
  showScreen(null);
  animId = requestAnimationFrame(loop);
}

// ===== SPAWN =====
function spawnDish() {
  let type = weightedPick(DISH_TYPES);
  let w = type.wRatio * W;
  let h = type.hRatio * H;
  // Ensure minimum visible size (doubled)
  w = Math.max(w, 60);
  h = Math.max(h, 32);
  let x = rand(w / 2 + 10, W - w / 2 - 10);
  let speed = (60 + rand(20, 50) * baseSpeed) * type.speedMul;
  dishes.push({
    type, x, y: -h, w, h, speed,
    caught: false, alpha: 1
  });
}

function spawnBonus() {
  let isFreeze = Math.random() < 0.5;
  let bh = 36;
  let y = rand(H * 0.15, H * 0.5);
  let fromLeft = Math.random() < 0.5;
  bonuses.push({
    type: isFreeze ? 'freeze' : 'clear',
    text: isFreeze ? '📱 Срочно ответить!' : '🤝 Друзья помогают',
    x: fromLeft ? -200 : W + 200,
    y: y,
    speed: (fromLeft ? 1 : -1) * rand(60, 100),
    w: 180, h: bh, alpha: 1
  });
}

// ===== PARTICLES =====
function addCatchParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y, vx: rand(-80, 80), vy: rand(-120, -20),
      life: 0.6, maxLife: 0.6, color, r: rand(2, 5), type: 'normal'
    });
  }
}

function addBreakParticles(x, y, color) {
  // Impact flash
  particles.push({
    x, y, vx: 0, vy: 0,
    life: 0.2, maxLife: 0.2, color: '#ffffff', r: 30, type: 'flash'
  });
  // Colored shards (12-15 particles)
  let count = randInt(12, 15);
  for (let i = 0; i < count; i++) {
    let angle = (Math.PI * 2 / count) * i + rand(-0.3, 0.3);
    let speed = rand(100, 250);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - rand(50, 120),
      life: 0.8, maxLife: 0.8,
      color: color,
      r: rand(4, 8),
      type: 'shard'
    });
  }
  // White/yellow sparkle particles
  for (let i = 0; i < 5; i++) {
    let angle = rand(0, Math.PI * 2);
    let speed = rand(60, 180);
    particles.push({
      x: x + rand(-10, 10), y: y + rand(-10, 10),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - rand(30, 80),
      life: 0.8, maxLife: 0.8,
      color: Math.random() < 0.5 ? '#ffffff' : '#ffd700',
      r: rand(2, 5),
      type: 'sparkle'
    });
  }
}

// ===== TABLE DRAWING =====
function addTableDish(type) {
  let tw = type.wRatio * W * 0.6;
  let th = type.hRatio * H * 0.5;
  tw = Math.max(tw, 36); th = Math.max(th, 20);
  // Spread dishes horizontally across the table instead of stacking
  let slotCount = TABLE_MAX;
  let slotWidth = (W * 0.8) / slotCount;
  let idx = tableDishes.length % slotCount;
  let slotX = W * 0.1 + idx * slotWidth + (slotWidth - tw) / 2;
  tableDishes.push({
    type, x: slotX, w: tw, h: th,
    rotation: rand(-0.2, 0.2)
  });
}

// ===== INPUT =====
function handleClick(cx, cy) {
  if (state !== 'playing') return;

  // Check pause button
  let pauseSize = 48;
  let pauseX = W - pauseSize - 16;
  let pauseY = 8;
  if (cx >= pauseX && cx <= pauseX + pauseSize && cy >= pauseY && cy <= pauseY + pauseSize) {
    pauseGame(); return;
  }

  // Check bonuses first
  for (let i = bonuses.length - 1; i >= 0; i--) {
    let b = bonuses[i];
    if (cx >= b.x - b.w / 2 && cx <= b.x + b.w / 2 && cy >= b.y - b.h / 2 && cy <= b.y + b.h / 2) {
      if (b.type === 'freeze') {
        freezeEnd = performance.now() + FREEZE_DURATION;
      } else {
        tablePile = Math.max(0, tablePile - 3);
        for (let j = 0; j < 3 && tableDishes.length > 0; j++) tableDishes.pop();
      }
      addCatchParticles(b.x, b.y, '#ffa726');
      bonuses.splice(i, 1);
      return;
    }
  }

  // Check dishes (top to bottom, last spawned first)
  for (let i = dishes.length - 1; i >= 0; i--) {
    let d = dishes[i];
    if (d.caught) continue;
    let tapPad = 10; // extra tap area for mobile
    if (cx >= d.x - d.w / 2 - tapPad && cx <= d.x + d.w / 2 + tapPad && cy >= d.y - d.h / 2 - tapPad && cy <= d.y + d.h / 2 + tapPad) {
      d.caught = true;
      score += d.type.points;
      // Auto-save score every 10 points to prevent loss on crash
      if (score > 0 && score > highScore && score !== _lastAutoSave && score % 10 === 0) {
        _lastAutoSave = score;
        highScore = score;
        if (window.GameHub) window.GameHub.submitScore('bardak-vitalik', score);
      }
      addCatchParticles(d.x, d.y, d.type.color);
      return;
    }
  }
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  let rect = canvas.getBoundingClientRect();
  handleClick(e.clientX - rect.left, e.clientY - rect.top);
});

// Keyboard pause
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' || e.key === 'p') {
    if (state === 'playing') pauseGame();
    else if (state === 'paused') resumeGame();
  }
});


// ===== GAME LOOP =====
function loop(ts) {
  if (state !== 'playing') return;
  if (!lastTime) { lastTime = ts; animId = requestAnimationFrame(loop); return; }
  let dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  gameTime += dt;
  gameElapsed += dt;

  // Speed increase every 30 seconds (gentle ramp)
  let currentTick = Math.floor(gameElapsed / 30);
  if (currentTick > lastSpeedTick) {
    speedMultiplier *= 1.04;
    lastSpeedTick = currentTick;
  }

  let frozen = performance.now() < freezeEnd;

  // Difficulty ramp (gentle: /90 for speed, *3 for spawn interval)
  baseSpeed = 1.5 + gameTime / 90;
  spawnInterval = Math.max(700, 1800 - gameTime * 3);

  // Spawn dishes
  spawnTimer -= dt * 1000;
  if (spawnTimer <= 0) {
    spawnDish();
    // Chance to spawn multiple (delayed and less frequent)
    if (gameTime > 50 && Math.random() < 0.2) spawnDish();
    if (gameTime > 90 && Math.random() < 0.15) spawnDish();
    spawnTimer = spawnInterval + rand(-200, 200);
  }

  // Spawn bonuses
  if (performance.now() >= nextBonusTime) {
    spawnBonus();
    nextBonusTime = performance.now() + rand(BONUS_INTERVAL_MIN, BONUS_INTERVAL_MAX);
  }

  // Update dishes
  let tableZone = H * 0.85;
  for (let i = dishes.length - 1; i >= 0; i--) {
    let d = dishes[i];
    if (d.caught) {
      d.alpha -= dt * 4;
      if (d.alpha <= 0) { dishes.splice(i, 1); continue; }
    } else if (!frozen) {
      d.y += d.speed * dt * baseSpeed * speedMultiplier;
      if (d.y - d.h / 2 > tableZone) {
        // Missed — add to table with dramatic break
        addBreakParticles(d.x, tableZone, d.type.color);
        tablePile += d.type.slots;
        addTableDish(d.type);
        dishes.splice(i, 1);
        if (tablePile >= TABLE_MAX) {
          showGameOver();
          return;
        }
      }
    }
  }

  // Update bonuses
  for (let i = bonuses.length - 1; i >= 0; i--) {
    let b = bonuses[i];
    b.x += b.speed * dt;
    if (b.x < -250 || b.x > W + 250) { bonuses.splice(i, 1); }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  draw(frozen);
  animId = requestAnimationFrame(loop);
}

// ===== DRAW =====
function draw(frozen) {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, W, H);

  // Table zone
  let tableY = H * 0.85;
  ctx.fillStyle = '#1a2a44';
  ctx.fillRect(0, tableY, W, H - tableY);
  ctx.fillStyle = '#2a3a5c';
  ctx.fillRect(0, tableY, W, 3);

  // Dishwasher rack visual at bottom 60px
  let rackTop = H - 60;
  ctx.fillStyle = '#1e1e1e';
  ctx.fillRect(0, rackTop, W, 60);
  // Rack grid lines
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 1;
  // Horizontal bars
  for (let ry = rackTop + 15; ry < H; ry += 15) {
    ctx.beginPath();
    ctx.moveTo(0, ry);
    ctx.lineTo(W, ry);
    ctx.stroke();
  }
  // Vertical bars
  for (let rx = 20; rx < W; rx += 20) {
    ctx.beginPath();
    ctx.moveTo(rx, rackTop);
    ctx.lineTo(rx, H);
    ctx.stroke();
  }
  // Label
  ctx.fillStyle = '#555';
  ctx.font = 'bold ' + Math.max(20, W * 0.03) + 'px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('ПОСУДОМОЙКА', W / 2, H - 4);

  // Table pile dishes
  for (let td of tableDishes) {
    ctx.save();
    ctx.translate(td.x + td.w / 2, tableY + 10 + td.h / 2);
    ctx.rotate(td.rotation);
    ctx.fillStyle = td.type.color;
    ctx.globalAlpha = 0.7;
    if (td.type.shape === 'ellipse') {
      ctx.beginPath();
      ctx.ellipse(0, 0, td.w / 2, td.h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.fillRect(-td.w / 2, -td.h / 2, td.w, td.h);
      ctx.strokeStyle = '#0a1628';
      ctx.lineWidth = 1;
      ctx.strokeRect(-td.w / 2, -td.h / 2, td.w, td.h);
    }
    ctx.restore();
  }

  // Freeze overlay — prominent blue tint when active
  if (frozen) {
    ctx.fillStyle = 'rgba(0, 100, 255, 0.18)';
    ctx.fillRect(0, 0, W, H);
    // Frost border effect
    ctx.strokeStyle = 'rgba(100, 181, 246, 0.5)';
    ctx.lineWidth = 6;
    ctx.strokeRect(3, 3, W - 6, H - 6);
  }

  // Dishes
  for (let d of dishes) {
    ctx.save();
    ctx.globalAlpha = d.alpha;
    ctx.fillStyle = d.type.color;
    let x = d.x, y = d.y, w = d.w, h = d.h;
    if (d.type.shape === 'ellipse') {
      ctx.beginPath();
      ctx.ellipse(x, y, w / 2, h / 2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // Inner ring for plate
      ctx.beginPath();
      ctx.ellipse(x, y, w / 3, h / 3, 0, 0, Math.PI * 2);
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if (d.type.name === 'cup') {
      // Cup shape
      ctx.fillRect(x - w / 2, y - h / 2, w, h);
      ctx.strokeStyle = '#5c9bd4';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x - w / 2, y - h / 2, w, h);
      // Handle
      ctx.beginPath();
      ctx.arc(x + w / 2 + 4, y, h / 3, -Math.PI / 2, Math.PI / 2);
      ctx.strokeStyle = '#90caf9';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else if (d.type.name === 'pan') {
      // Pan body
      ctx.fillRect(x - w / 2, y - h / 2, w * 0.7, h);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x - w / 2, y - h / 2, w * 0.7, h);
      // Handle
      ctx.fillStyle = '#4e342e';
      ctx.fillRect(x - w / 2 + w * 0.7, y - h / 4, w * 0.3, h / 2);
    } else if (d.type.name === 'pot') {
      // Pot body
      ctx.fillRect(x - w / 2, y - h / 3, w, h * 0.7);
      ctx.strokeStyle = '#5d4037';
      ctx.lineWidth = 2;
      ctx.strokeRect(x - w / 2, y - h / 3, w, h * 0.7);
      // Lid
      ctx.fillStyle = '#a1887f';
      ctx.fillRect(x - w / 2 - 4, y - h / 3 - 4, w + 8, 6);
      // Handles
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(x - w / 2 - 8, y, 8, 6);
      ctx.fillRect(x + w / 2, y, 8, 6);
      // Lid knob
      ctx.beginPath();
      ctx.arc(x, y - h / 3 - 6, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#4e342e';
      ctx.fill();
    }
    ctx.restore();
  }

  // Bonuses
  for (let b of bonuses) {
    ctx.save();
    let bw = b.w, bh = b.h;
    if (b.type === 'freeze') {
      // Freeze bonus: larger with pulsing glow
      let pulse = 1 + 0.15 * Math.sin(performance.now() / 150);
      bw = b.w * 1.3 * pulse;
      bh = b.h * 1.4 * pulse;
      ctx.shadowColor = '#64b5f6';
      ctx.shadowBlur = 25 + 10 * Math.sin(performance.now() / 200);
      ctx.globalAlpha = 0.95;
      ctx.fillStyle = 'rgba(100, 181, 246, 0.9)';
      ctx.beginPath();
      ctx.roundRect(b.x - bw / 2, b.y - bh / 2, bw, bh, 12);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(b.x - bw / 2, b.y - bh / 2, bw, bh, 12);
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.max(22, bh * 0.42) + 'px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('❄ ' + b.text, b.x, b.y);
    } else {
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = 'rgba(0, 230, 118, 0.85)';
      ctx.beginPath();
      ctx.roundRect(b.x - bw / 2, b.y - bh / 2, bw, bh, 10);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold ' + Math.max(20, bh * 0.38) + 'px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(b.text, b.x, b.y);
    }
    ctx.restore();
  }

  // Particles
  for (let p of particles) {
    ctx.save();
    let alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    if (p.type === 'flash') {
      // Expanding flash circle
      let progress = 1 - (p.life / p.maxLife);
      let flashR = p.r * (0.5 + progress * 0.5);
      ctx.globalAlpha = alpha * 0.7;
      ctx.beginPath();
      ctx.arc(p.x, p.y, flashR, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * Math.min(1, alpha + 0.3), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // HUD
  let hudY = 16;
  let fontSize = Math.max(20, Math.min(24, W * 0.04));
  ctx.font = 'bold ' + fontSize + 'px monospace';
  ctx.textBaseline = 'top';

  // Score top-left
  ctx.fillStyle = '#00e676';
  ctx.textAlign = 'left';
  ctx.fillText('Счёт: ' + score, 20, hudY);

  // Record top-right (offset for pause button)
  ctx.fillStyle = '#ffd700';
  ctx.textAlign = 'right';
  ctx.fillText('Рекорд: ' + highScore, W - 76, hudY);

  // Table meter
  let meterY = hudY + fontSize + 8;
  ctx.fillStyle = tablePile >= 4 ? '#ff1744' : tablePile >= 3 ? '#ffa726' : '#00e676';
  ctx.textAlign = 'left';
  ctx.fillText('Посудомойка: ' + tablePile + '/' + TABLE_MAX, 20, meterY);

  // Meter bar
  let barX = 20, barY = meterY + fontSize + 4, barW = Math.min(160, W * 0.35), barH = 8;
  ctx.fillStyle = '#1a2a44';
  ctx.fillRect(barX, barY, barW, barH);
  let fill = (tablePile / TABLE_MAX) * barW;
  ctx.fillStyle = tablePile >= 4 ? '#ff1744' : tablePile >= 3 ? '#ffa726' : '#00e676';
  ctx.fillRect(barX, barY, fill, barH);

  // Freeze timer — prominent display
  if (frozen) {
    let remaining = Math.ceil((freezeEnd - performance.now()) / 1000);
    let freezeFontSize = Math.max(28, Math.min(36, W * 0.06));
    ctx.save();
    // Background banner
    ctx.fillStyle = 'rgba(0, 80, 200, 0.7)';
    ctx.fillRect(W / 2 - 140, hudY - 4, 280, freezeFontSize + 12);
    // Text
    ctx.font = 'bold ' + freezeFontSize + 'px monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('❄ ЗАМОРОЖЕНО ' + remaining + 'с', W / 2, hudY);
    ctx.restore();
  }

  // Pause button
  let ps = 48;
  let px = W - ps - 16, py = 8;
  ctx.fillStyle = 'rgba(42, 58, 92, 0.8)';
  ctx.beginPath();
  ctx.roundRect(px, py, ps, ps, 8);
  ctx.fill();
  ctx.fillStyle = '#e0e0e0';
  ctx.fillRect(px + 15, py + 12, 7, 24);
  ctx.fillRect(px + 26, py + 12, 7, 24);
}

// ===== INIT =====
loadHigh();
showStart();
</script>
